<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 100%);
    }
    .auth-box {
      background: #0f3460;
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,107,157,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff6b9d;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      text-align: center;
      color: #a0a0b0;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
      color: #eaeaea;
    }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      background: #1a1a2e;
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 12px;
      color: #eaeaea;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus { border-color: #ff6b9d; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230,57,70,0.4);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #a0a0b0;
    }
    .auth-switch a {
      color: #ff6b9d;
      text-decoration: none;
      font-weight: 600;
    }
    .welcome-back {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 18px;
    }
    .forgot a {
      color: #ff6b9d;
      font-size: 0.8rem;
      text-decoration: none;
    }
    .error-msg {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      color: #e63946;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4caf50;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">💕 EntranceHearts</a>
    <div class="nav-buttons">
      <a href="signup.html" class="btn-primary">Sign Up</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💕</div>
      <div class="welcome-back">Welcome Back!</div>
      <div class="auth-subtitle">Login to find your match 💕</div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        Login to EntranceHearts 💕
      </button>

    </div>
    <div class="auth-switch">
      New here? <a href="signup.html">Create free account</a>
    </div>
  </div>

  <script>
    // If already logged in redirect
    async function checkSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('id')
      .eq('id', data.session.user.id)
      .single();
    if (profile) {
      window.location.href = 'browse.html';
    } else {
      window.location.href = 'signup.html';
    }
  }
}
checkSession();

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showError('Please fill in all fields!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email, password
        });

        if (error) throw error;

        const { data: profile } = await supabaseClient
  .from('profiles')
  .select('id')
  .eq('id', data.user.id)
  .single();

// Save pending profile if exists
const tempUser = localStorage.getItem('ehTempUser');
if (tempUser && !profile) {
  const userData = JSON.parse(tempUser);
  await supabaseClient.from('profiles').insert({
    id: data.user.id,
    ...userData
  });
  localStorage.removeItem('ehTempUser');
}
showSuccess('Login successful! Redirecting...');
setTimeout(() => window.location.href = 'browse.html', 1000);

      } catch (err) {
        showError(err.message || 'Invalid email or password!');
        btn.disabled = false;
        btn.textContent = 'Login to EntranceHearts 💕';
      }
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
