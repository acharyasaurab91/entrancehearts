<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
   
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">💕 EntranceHearts</a>
    <div class="nav-buttons">
      <a href="signup.html" class="btn-primary">Sign Up</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💕</div>
      <div class="welcome-back">Welcome Back!</div>
      <div class="auth-subtitle">Login to find your match 💕</div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        Login to EntranceHearts 💕
      </button>

    </div>
    <div class="auth-switch">
      New here? <a href="signup.html">Create free account</a>
    </div>
  </div>

  <script>
    // If already logged in redirect
    async function checkSession() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('id')
      .eq('id', data.session.user.id)
      .single();
    if (profile) {
      window.location.href = 'browse.html';
    } else {
      window.location.href = 'signup.html';
    }
  }
}
checkSession();

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showError('Please fill in all fields!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email, password
        });

        if (error) throw error;

        const { data: profile } = await supabaseClient
  .from('profiles')
  .select('id')
  .eq('id', data.user.id)
  .single();

// Save pending profile if exists
const tempUser = localStorage.getItem('ehTempUser');
if (tempUser && !profile) {
  const userData = JSON.parse(tempUser);
  await supabaseClient.from('profiles').insert({
    id: data.user.id,
    ...userData
  });
  localStorage.removeItem('ehTempUser');
}
showSuccess('Login successful! Redirecting...');
setTimeout(() => window.location.href = 'browse.html', 1000);

      } catch (err) {
        showError(err.message || 'Invalid email or password!');
        btn.disabled = false;
        btn.textContent = 'Login to EntranceHearts 💕';
      }
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>


  <script>
  // Page transition effect
  document.body.classList.add('fade-in');
  
  // Add scroll effect to navbar
  window.addEventListener('scroll', function() {
    const navbar = document.querySelector('.navbar');
    if (navbar) {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }
  });
  </script>
  
</body>
</html>
