<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Login — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 16px 32px; background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,20,147,0.2);
      transition: all 0.3s; display: flex; justify-content: space-between; align-items: center;
    }
    .navbar.scrolled { padding: 12px 32px; background: rgba(10, 10, 15, 0.95); }
    .logo {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-buttons { display: flex; gap: 12px; }
    .btn-primary {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      color: white; padding: 8px 24px; border-radius: 100px;
      text-decoration: none; font-weight: 600; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,20,147,0.3); }

    .auth-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 100px 20px 60px;
      background: radial-gradient(circle at 50% 0%, rgba(255,20,147,0.08), transparent 60%);
    }
    .auth-box {
      background: #141423; border: 1px solid rgba(255,20,147,0.2);
      border-radius: 32px; padding: 40px 32px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .auth-logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    .welcome-back {
      text-align: center; font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .auth-subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 28px; }
    .error-msg {
      background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3);
      color: #ff4444; padding: 10px 14px; border-radius: 12px;
      font-size: 0.82rem; margin-bottom: 16px; display: none;
    }
    .success-msg {
      background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3);
      color: #4caf50; padding: 10px 14px; border-radius: 12px;
      font-size: 0.82rem; margin-bottom: 16px; display: none;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.85rem; font-weight: 600;
      margin-bottom: 8px; color: rgba(255,255,255,0.7);
    }
    .form-group input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,20,147,0.2); border-radius: 16px;
      color: white; font-size: 0.9rem; font-family: 'Inter', sans-serif;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus { border-color: #FF1493; background: rgba(255,20,147,0.05); }
    .forgot { text-align: right; margin-bottom: 20px; }
    .forgot a { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-decoration: none; cursor: pointer; }
    .forgot a:hover { color: #FF6B9D; }
    .submit-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none; border-radius: 100px; color: white; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: all 0.3s;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,20,147,0.3); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .auth-switch a { color: #FF6B9D; text-decoration: none; font-weight: 600; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: 32px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div style="max-width: 1280px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo">💕 EntranceHearts</a>
      <div class="nav-buttons">
        <a href="signup.html" class="btn-primary">✨ Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💕</div>
      <div class="welcome-back">Welcome Back!</div>
      <div class="auth-subtitle">Login to find your match</div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
      </div>

      <div class="forgot">
        <a id="forgotPasswordLink">Forgot password?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        Login to EntranceHearts 💕
      </button>
    </div>
    <div class="auth-switch">
      New here? <a href="signup.html">Create free account</a>
    </div>
  </div>

  <!-- MAGIC LINK RESET MODAL -->
  <div id="resetModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 2.5rem; margin-bottom: 16px;">🔐</div>
      <h3 style="margin-bottom: 8px;">Reset Password</h3>
      <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 20px;">
        Enter your email to receive a password reset link
      </p>
      <input type="email" id="resetEmail" placeholder="your@email.com" 
        style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); border-radius: 14px; color: white; margin-bottom: 20px;">
      <button id="sendResetLinkBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer; margin-bottom: 12px;">
        Send Reset Link
      </button>
      <button onclick="closeResetModal()" style="width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,20,147,0.3); border-radius: 100px; color: rgba(255,255,255,0.7); cursor: pointer;">
        Cancel
      </button>
    </div>
  </div>

  <script>
    // ========== ORIGINAL LOGIN FUNCTIONS ==========
    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('id')
          .eq('id', data.session.user.id)
          .single();
        if (profile) {
          window.location.href = 'browse.html';
        } else {
          window.location.href = 'signup.html';
        }
      }
    }
    checkSession();

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showError('Please fill in all fields!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email, password
        });

        if (error) throw error;

        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('id')
          .eq('id', data.user.id)
          .single();

        const tempUser = localStorage.getItem('ehTempUser');
        if (tempUser && !profile) {
          const userData = JSON.parse(tempUser);
          await supabaseClient.from('profiles').insert({
            id: data.user.id,
            ...userData
          });
          localStorage.removeItem('ehTempUser');
        }
        
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'browse.html', 1000);

      } catch (err) {
        showError(err.message || 'Invalid email or password!');
        btn.disabled = false;
        btn.textContent = 'Login to EntranceHearts 💕';
      }
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // ========== MAGIC LINK PASSWORD RESET ==========
    function openResetModal() {
      document.getElementById('resetModal').classList.add('active');
      document.getElementById('resetEmail').value = '';
    }

    function closeResetModal() {
      document.getElementById('resetModal').classList.remove('active');
    }

    async function sendResetLink() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) {
        showError('Please enter your email');
        return;
      }

      const btn = document.getElementById('sendResetLinkBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/update-password.html'
        });

        if (error) throw error;

        closeResetModal();
        showSuccess('Password reset link sent! Check your email.');

      } catch (err) {
        showError(err.message || 'Failed to send reset link. Make sure email exists.');
      }

      btn.disabled = false;
      btn.textContent = originalText;
    }

    // Attach event listeners
    document.getElementById('forgotPasswordLink').addEventListener('click', openResetModal);
    document.getElementById('sendResetLinkBtn').addEventListener('click', sendResetLink);

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else if (navbar) {
        navbar.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
