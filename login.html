<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Login — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 16px 32px; background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,20,147,0.2);
      transition: all 0.3s; display: flex; justify-content: space-between; align-items: center;
    }
    .navbar.scrolled { padding: 12px 32px; background: rgba(10, 10, 15, 0.95); }
    .logo {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-buttons { display: flex; gap: 12px; }
    .btn-primary {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      color: white; padding: 8px 24px; border-radius: 100px;
      text-decoration: none; font-weight: 600; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,20,147,0.3); }

    .auth-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 100px 20px 60px;
      background: radial-gradient(circle at 50% 0%, rgba(255,20,147,0.08), transparent 60%);
    }
    .auth-box {
      background: #141423; border: 1px solid rgba(255,20,147,0.2);
      border-radius: 32px; padding: 40px 32px; width: 100%; max-width: 420px;
    }
    .auth-logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    .welcome-back { text-align: center; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #FF1493, #FF6B9D); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.85rem; margin: 4px 0 28px; }
    .error-msg { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff4444; padding: 10px 14px; border-radius: 12px; font-size: 0.82rem; margin-bottom: 16px; display: none; }
    .success-msg { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #4caf50; padding: 10px 14px; border-radius: 12px; font-size: 0.82rem; margin-bottom: 16px; display: none; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
    .form-group input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.2); border-radius: 16px; color: white; font-size: 0.9rem; outline: none; }
    .form-group input:focus { border-color: #FF1493; background: rgba(255,20,147,0.05); }
    .forgot { text-align: right; margin-bottom: 20px; }
    .forgot a { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-decoration: none; cursor: pointer; }
    .forgot a:hover { color: #FF6B9D; }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,20,147,0.3); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .auth-switch a { color: #FF6B9D; text-decoration: none; font-weight: 600; }

    /* OTP Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #141423; border: 1px solid rgba(255,20,147,0.3); border-radius: 32px; padding: 32px; text-align: center; max-width: 450px; width: 90%; }
    .otp-inputs { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
    .otp-input { width: 50px; height: 56px; border-radius: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); color: white; font-size: 1.4rem; font-weight: 700; text-align: center; }
    .otp-input:focus { outline: none; border-color: #FF1493; }
    .resend-link { margin-top: 12px; font-size: 0.75rem; }
    .resend-link span { color: rgba(255,255,255,0.4); }
    .resend-link button { background: none; border: none; color: #FF6B9D; cursor: pointer; font-size: 0.75rem; }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div style="max-width: 1280px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo">💕 EntranceHearts</a>
      <div class="nav-buttons">
        <a href="signup.html" class="btn-primary">✨ Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💕</div>
      <div class="welcome-back">Welcome Back!</div>
      <div class="auth-subtitle">Login to find your match</div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
      </div>

      <div class="forgot">
        <a id="forgotPasswordLink">Forgot password?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Login to EntranceHearts 💕</button>
    </div>
    <div class="auth-switch">New here? <a href="signup.html">Create free account</a></div>
  </div>

  <!-- Email Modal -->
  <div id="resetEmailModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 2.5rem; margin-bottom: 16px;">🔐</div>
      <h3>Reset Password</h3>
      <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Enter your email to receive OTP</p>
      <input type="email" id="resetEmail" placeholder="your@email.com" style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); border-radius: 14px; color: white; margin-bottom: 20px;">
      <button id="sendOtpBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer; margin-bottom: 12px;">Send OTP</button>
      <button onclick="closeResetEmailModal()" style="width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,20,147,0.3); border-radius: 100px; color: rgba(255,255,255,0.7); cursor: pointer;">Cancel</button>
    </div>
  </div>

  <!-- OTP Modal -->
  <div id="otpModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 2rem;">📧</div>
      <h3>Enter OTP</h3>
      <p style="color: rgba(255,255,255,0.5); margin-bottom: 8px;">We sent a 6-digit code to <span id="otpEmailDisplay" style="color: #FF6B9D;"></span></p>
      <div class="otp-inputs">
        <input class="otp-input" id="otp1" maxlength="1" oninput="otpMove(this, 'otp2')" onkeydown="otpBack(event, this, '')">
        <input class="otp-input" id="otp2" maxlength="1" oninput="otpMove(this, 'otp3')" onkeydown="otpBack(event, this, 'otp1')">
        <input class="otp-input" id="otp3" maxlength="1" oninput="otpMove(this, 'otp4')" onkeydown="otpBack(event, this, 'otp2')">
        <input class="otp-input" id="otp4" maxlength="1" oninput="otpMove(this, 'otp5')" onkeydown="otpBack(event, this, 'otp3')">
        <input class="otp-input" id="otp5" maxlength="1" oninput="otpMove(this, 'otp6')" onkeydown="otpBack(event, this, 'otp4')">
        <input class="otp-input" id="otp6" maxlength="1" oninput="otpMove(this, '')" onkeydown="otpBack(event, this, 'otp5')">
      </div>
      <button id="verifyOtpBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer; margin-bottom: 12px;">Verify OTP</button>
      <div class="resend-link"><span>Didn't receive code?</span> <button id="resendOtpBtn">Resend OTP</button></div>
    </div>
  </div>

  <!-- New Password Modal -->
  <div id="newPasswordModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 2rem;">🔐</div>
      <h3>Create New Password</h3>
      <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Enter your new password</p>
      <input type="password" id="newPassword" placeholder="New password (min 8 characters)" style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); border-radius: 14px; color: white; margin-bottom: 16px;">
      <input type="password" id="confirmPassword" placeholder="Confirm password" style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); border-radius: 14px; color: white; margin-bottom: 20px;">
      <button id="updatePasswordBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer;">Update Password</button>
    </div>
  </div>

  <script>
    let resetEmailGlobal = '';

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        const { data: profile } = await supabaseClient.from('profiles').select('id').eq('id', data.session.user.id).single();
        if (profile) window.location.href = 'browse.html';
        else window.location.href = 'signup.html';
      }
    }
    checkSession();

    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = '❌ ' + msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
    function showSuccess(msg) { const el = document.getElementById('successMsg'); el.textContent = '✅ ' + msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      if (!email || !password) { showError('Please fill in all fields!'); return; }
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const { data: profile } = await supabaseClient.from('profiles').select('id').eq('id', data.user.id).single();
        const tempUser = localStorage.getItem('ehTempUser');
        if (tempUser && !profile) { const userData = JSON.parse(tempUser); await supabaseClient.from('profiles').insert({ id: data.user.id, ...userData }); localStorage.removeItem('ehTempUser'); }
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'browse.html', 1000);
      } catch (err) { showError(err.message || 'Invalid email or password!'); btn.disabled = false; btn.textContent = 'Login to EntranceHearts 💕'; }
    }
    document.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });

    // OTP Functions
    function openResetEmailModal() { document.getElementById('resetEmailModal').classList.add('active'); document.getElementById('resetEmail').value = ''; }
    function closeResetEmailModal() { document.getElementById('resetEmailModal').classList.remove('active'); }
    function closeOtpModal() { document.getElementById('otpModal').classList.remove('active'); for (let i = 1; i <= 6; i++) document.getElementById(`otp${i}`).value = ''; }
    function closeNewPasswordModal() { document.getElementById('newPasswordModal').classList.remove('active'); document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
    function otpMove(current, nextId) { current.value = current.value.replace(/[^0-9]/g, ''); if (current.value.length === 1 && nextId) document.getElementById(nextId).focus(); }
    function otpBack(e, current, prevId) { if (e.key === 'Backspace' && current.value === '' && prevId) document.getElementById(prevId).focus(); }
    function getOtpValue() { return ['otp1','otp2','otp3','otp4','otp5','otp6'].map(id => document.getElementById(id).value).join(''); }

    let resendTimer = null;
    let resendSeconds = 30;

    async function sendOtp() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { showError('Please enter your email'); return; }
      const btn = document.getElementById('sendOtpBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/update-password.html' });
        if (error) throw error;
        resetEmailGlobal = email;
        document.getElementById('otpEmailDisplay').textContent = email;
        closeResetEmailModal();
        document.getElementById('otpModal').classList.add('active');
        showSuccess('OTP sent to your email!');
        const resendBtn = document.getElementById('resendOtpBtn');
        resendSeconds = 30; resendBtn.disabled = true; resendBtn.textContent = `Resend (${resendSeconds}s)`;
        if (resendTimer) clearInterval(resendTimer);
        resendTimer = setInterval(() => { resendSeconds--; if (resendSeconds <= 0) { clearInterval(resendTimer); resendBtn.disabled = false; resendBtn.textContent = 'Resend OTP'; } else { resendBtn.textContent = `Resend (${resendSeconds}s)`; } }, 1000);
      } catch (err) { showError(err.message || 'Failed to send OTP.'); }
      btn.disabled = false; btn.textContent = 'Send OTP';
    }

    async function verifyOtp() {
      const otp = getOtpValue();
      if (otp.length !== 6) { showError('Please enter the 6-digit OTP'); return; }
      const btn = document.getElementById('verifyOtpBtn');
      btn.disabled = true; btn.textContent = 'Verifying...';
      try {
        const { error } = await supabaseClient.auth.verifyOtp({ email: resetEmailGlobal, token: otp, type: 'email' });
        if (error) throw error;
        closeOtpModal();
        document.getElementById('newPasswordModal').classList.add('active');
        showSuccess('OTP verified! Set your new password.');
      } catch (err) { showError(err.message || 'Invalid OTP. Please try again.'); }
      btn.disabled = false; btn.textContent = 'Verify OTP';
    }

    async function updatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (newPassword.length < 8) { showError('Password must be at least 8 characters'); return; }
      if (newPassword !== confirmPassword) { showError('Passwords do not match'); return; }
      const btn = document.getElementById('updatePasswordBtn');
      btn.disabled = true; btn.textContent = 'Updating...';
      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        closeNewPasswordModal();
        showSuccess('Password updated successfully! Please login with your new password.');
      } catch (err) { showError(err.message || 'Failed to update password'); }
      btn.disabled = false; btn.textContent = 'Update Password';
    }

    async function resendOtp() {
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(resetEmailGlobal, { redirectTo: window.location.origin + '/update-password.html' });
        if (error) throw error;
        showSuccess('New OTP sent!');
        const resendBtn = document.getElementById('resendOtpBtn');
        resendSeconds = 30; resendBtn.disabled = true;
        if (resendTimer) clearInterval(resendTimer);
        resendTimer = setInterval(() => { resendSeconds--; if (resendSeconds <= 0) { clearInterval(resendTimer); resendBtn.disabled = false; resendBtn.textContent = 'Resend OTP'; } else { resendBtn.textContent = `Resend (${resendSeconds}s)`; } }, 1000);
      } catch (err) { showError(err.message || 'Failed to resend OTP'); }
    }

    document.getElementById('forgotPasswordLink').addEventListener('click', openResetEmailModal);
    document.getElementById('sendOtpBtn').addEventListener('click', sendOtp);
    document.getElementById('verifyOtpBtn').addEventListener('click', verifyOtp);
    document.getElementById('updatePasswordBtn').addEventListener('click', updatePassword);
    document.getElementById('resendOtpBtn').addEventListener('click', resendOtp);

    window.addEventListener('scroll', () => { const navbar = document.getElementById('navbar'); if (navbar && window.scrollY > 50) navbar.classList.add('scrolled'); else if (navbar) navbar.classList.remove('scrolled'); });
  </script>
</body>
</html>
