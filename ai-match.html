<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Match — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; color:#fff; font-family:'Poppins',sans-serif; }
    .navbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 20px;
      background:rgba(10,10,15,0.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size:1.1rem; font-weight:800;
      background:linear-gradient(135deg,#ff6b9d,#e63946);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .page { max-width:480px; margin:0 auto; padding:70px 16px 100px; }
    .ai-hero { text-align:center; margin-bottom:28px; padding-top:10px; }
    .ai-icon {
      width:80px; height:80px; border-radius:24px;
      background:linear-gradient(135deg,rgba(230,57,70,0.2),rgba(255,107,157,0.1));
      border:1px solid rgba(255,107,157,0.2);
      display:flex; align-items:center; justify-content:center;
      font-size:2.5rem; margin:0 auto 16px;
    }
    .ai-title {
      font-size:1.5rem; font-weight:800; margin-bottom:6px;
      background:linear-gradient(135deg,#ff6b9d,#e63946);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .ai-sub { color:rgba(255,255,255,0.35); font-size:0.82rem; line-height:1.6; }
    .question-card {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:20px; padding:22px 18px; margin-bottom:14px;
    }
    .question-title {
      font-size:0.78rem; font-weight:700; color:#ff6b9d;
      text-transform:uppercase; letter-spacing:1px; margin-bottom:14px;
    }
    .question-text {
      font-size:0.92rem; font-weight:600; margin-bottom:12px;
    }
    .options-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
    }
    .option-btn {
      padding:11px 8px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:12px; color:rgba(255,255,255,0.5);
      font-size:0.78rem; font-family:'Poppins',sans-serif;
      cursor:pointer; transition:all 0.2s; text-align:center;
    }
    .option-btn.selected {
      border-color:rgba(255,107,157,0.5);
      color:#ff6b9d;
      background:rgba(255,107,157,0.08);
    }
    .ai-textarea {
      width:100%; padding:14px 16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:14px; color:#fff;
      font-size:0.88rem; font-family:'Poppins',sans-serif;
      outline:none; resize:none; line-height:1.6;
      transition:border 0.2s;
    }
    .ai-textarea:focus { border-color:rgba(255,107,157,0.4); }
    .analyze-btn {
      width:100%; padding:16px;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      border:none; border-radius:16px; color:white;
      font-size:1rem; font-weight:700;
      font-family:'Poppins',sans-serif; cursor:pointer;
      margin-top:6px; transition:all 0.2s;
    }
    .analyze-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(230,57,70,0.35); }
    .analyze-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .loading-area { text-align:center; padding:40px 20px; display:none; }
    .loading-spin {
      font-size:3rem; animation:spin 1s linear infinite;
      display:block; margin-bottom:16px;
    }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .result-area { display:none; }
    .result-card {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,107,157,0.15);
      border-radius:20px; padding:22px 18px; margin-bottom:14px;
    }
    .result-title {
      font-size:0.78rem; font-weight:700; color:#ff6b9d;
      text-transform:uppercase; letter-spacing:1px; margin-bottom:14px;
    }
    .result-text {
      color:rgba(255,255,255,0.65); font-size:0.87rem;
      line-height:1.7; white-space:pre-wrap;
    }
    .matched-person {
      display:flex; align-items:center; gap:14px;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .matched-person:last-child { border-bottom:none; padding-bottom:0; }
    .matched-avatar {
      width:52px; height:52px; border-radius:50%;
      background:rgba(255,255,255,0.06);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; flex-shrink:0; overflow:hidden;
    }
    .matched-avatar img {
      width:100%; height:100%; object-fit:cover; border-radius:50%;
    }
    .matched-name { font-size:0.92rem; font-weight:700; margin-bottom:3px; }
    .matched-meta { font-size:0.75rem; color:rgba(255,255,255,0.35); margin-bottom:8px; }
    .compat-bar {
      height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden;
    }
    .compat-fill {
      height:100%;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      border-radius:2px; transition:width 1s ease;
    }
    .compat-label {
      font-size:0.7rem; color:#ff6b9d; font-weight:600; margin-top:3px;
    }
    .retry-btn {
      width:100%; padding:14px; background:transparent;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; color:rgba(255,255,255,0.4);
      font-family:'Poppins',sans-serif; cursor:pointer; margin-top:6px;
    }
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(10,10,15,0.98);
      border-top:1px solid rgba(255,255,255,0.05);
      display:flex; justify-content:space-around;
      padding:10px 0 16px; z-index:100;
      backdrop-filter:blur(20px);
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center;
      gap:3px; color:rgba(255,255,255,0.3);
      text-decoration:none; font-size:0.62rem; font-weight:600;
    }
    .nav-item.active { color:#ff6b9d; }
    .nav-item span:first-child { font-size:1.3rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">💕 EntranceHearts</div>
  </nav>

  <div class="page">
    <div class="ai-hero">
      <div class="ai-icon">🤖</div>
      <div class="ai-title">AI Matchmaker</div>
      <div class="ai-sub">Answer a few questions and our AI finds your perfect match from real users</div>
    </div>

    <div id="formArea">
      <div class="question-card">
        <div class="question-title">🎯 Your Style</div>
        <div class="question-text">How do you study best?</div>
        <div class="options-grid">
          <button class="option-btn" onclick="pick(this,'study')">📚 Solo focus</button>
          <button class="option-btn" onclick="pick(this,'study')">👥 Study groups</button>
          <button class="option-btn" onclick="pick(this,'study')">🎵 With music</button>
          <button class="option-btn" onclick="pick(this,'study')">🌙 Late night</button>
        </div>
        <div class="question-text" style="margin-top:16px">Your personality?</div>
        <div class="options-grid">
          <button class="option-btn" onclick="pick(this,'personality')">😊 Introvert</button>
          <button class="option-btn" onclick="pick(this,'personality')">🎉 Extrovert</button>
          <button class="option-btn" onclick="pick(this,'personality')">⚖️ Ambivert</button>
          <button class="option-btn" onclick="pick(this,'personality')">🤔 Depends</button>
        </div>
        <div class="question-text" style="margin-top:16px">What matters most?</div>
        <div class="options-grid">
          <button class="option-btn" onclick="pick(this,'priority')">🧠 Same goals</button>
          <button class="option-btn" onclick="pick(this,'priority')">😂 Good humor</button>
          <button class="option-btn" onclick="pick(this,'priority')">💬 Deep talks</button>
          <button class="option-btn" onclick="pick(this,'priority')">🎯 Motivation</button>
        </div>
      </div>

      <div class="question-card">
        <div class="question-title">💭 About You</div>
        <textarea class="ai-textarea" id="selfDesc" rows="4"
          placeholder="Describe yourself and what kind of person you're looking for... (e.g. I am a CEE aspirant from Pokhara, I love physics and hiking, looking for someone ambitious and kind...)"></textarea>
      </div>

      <button class="analyze-btn" onclick="runAI()" id="analyzeBtn">
        🤖 Find My Perfect Match
      </button>
    </div>

    <div class="loading-area" id="loadingArea">
      <span class="loading-spin">🤖</span>
      <p style="color:rgba(255,255,255,0.4);font-size:0.88rem">
        AI is analyzing your personality...
      </p>
    </div>

    <div class="result-area" id="resultArea">
      <div class="result-card">
        <div class="result-title">🤖 AI Analysis</div>
        <div class="result-text" id="aiText"></div>
      </div>
      <div class="result-card">
        <div class="result-title">💕 Top Matches</div>
        <div id="matchedList"></div>
      </div>
      <button class="retry-btn" onclick="reset()">🔄 Try Again</button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item active"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    const categoryLabels = {
      cee:'CEE Aspirant', ioe:'IOE Aspirant',
      plus2:'+2 Student', management:'Management Student'
    };
    const picks = { study:'', personality:'', priority:'' };
    let currentUserId = null;
    let allProfiles = [];

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;
      const { data: profiles } = await supabaseClient
        .from('profiles').select('*').neq('id', currentUserId);
      allProfiles = profiles || [];
    }

    function pick(btn, group) {
      document.querySelectorAll(`.option-btn`).forEach(b => {
        if (b.getAttribute('onclick').includes(`'${group}'`))
          b.classList.remove('selected');
      });
      btn.classList.add('selected');
      picks[group] = btn.textContent.trim();
    }

    async function runAI() {
      const desc = document.getElementById('selfDesc').value.trim();
      if (!desc) {
        alert('Please describe yourself first!'); return;
      }
      const { data: myProfile } = await supabaseClient
        .from('profiles').select('*').eq('id', currentUserId).single();

      document.getElementById('formArea').style.display = 'none';
      document.getElementById('loadingArea').style.display = 'block';

      const prompt = `You are an AI matchmaker for EntranceHearts, a dating app for Nepali entrance exam students.

User: ${myProfile?.name || 'Unknown'}, ${myProfile?.category || 'aspirant'}, ${myProfile?.location || 'Nepal'}
Interests: ${(myProfile?.interests || []).join(', ')}
Study style: ${picks.study}
Personality: ${picks.personality}
Values: ${picks.priority}
About them: ${desc}

Available matches:
${allProfiles.slice(0,6).map((p,i) => `${i+1}. ${p.name} - ${categoryLabels[p.category]||p.category} from ${p.location||'Nepal'}, interests: ${(p.interests||[]).join(', ')}`).join('\n')}

Give:
1. A 2-3 sentence warm personality analysis
2. Top 3 matches with compatibility % and one sentence reason each

Keep it encouraging and fun!`;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            model:'claude-sonnet-4-20250514',
            max_tokens:1000,
            messages:[{ role:'user', content:prompt }]
          })
        });
        const data = await res.json();
        const text = data.content[0].text;
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('aiText').textContent = text;
        const topMatches = allProfiles.slice(0,3);
        const compats = [94, 87, 79];
        document.getElementById('matchedList').innerHTML =
          topMatches.map((p,i) => `
            <div class="matched-person">
              <div class="matched-avatar">
                ${p.avatar_url
                  ? `<img src="${p.avatar_url}" alt="${p.name}"/>`
                  : genderEmoji[p.gender] || '🧑'}
              </div>
              <div style="flex:1">
                <div class="matched-name">${p.name}</div>
                <div class="matched-meta">
                  ${categoryLabels[p.category]||p.category} • ${p.location||'Nepal'}
                </div>
                <div class="compat-bar">
                  <div class="compat-fill" style="width:${compats[i]}%"></div>
                </div>
                <div class="compat-label">${compats[i]}% Compatible</div>
              </div>
            </div>`).join('');
      } catch(err) {
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('formArea').style.display = 'block';
        alert('AI unavailable right now. Try again!');
      }
    }

    function reset() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('formArea').style.display = 'block';
      document.getElementById('selfDesc').value = '';
      document.querySelectorAll('.option-btn').forEach(b =>
        b.classList.remove('selected'));
    }

    init();
  </script>
</body>
</html>
