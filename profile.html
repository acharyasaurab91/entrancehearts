<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
</head>
<body>
  <nav class="navbar">
  <div class="logo">💕 EntranceHearts</div>
  <div style="display: flex; gap: 10px; align-items: center;">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>
  </nav>

  <div class="page" id="profilePage">
    <div class="loading-state">
      <div style="font-size:3rem;margin-bottom:14px">💕</div>
      <p style="color:rgba(255,255,255,0.3)">Loading profile...</p>
    </div>
  </div>

  <!-- EDIT SHEET OVERLAY -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeEdit()"></div>

  <!-- EDIT SHEET -->
  <div class="edit-sheet" id="editSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">✏️ Edit Profile</div>
      <div class="sheet-close" onclick="closeEdit()">✕</div>
    </div>
    <div class="sheet-body">

      <div class="photo-picker">
        <div class="photo-preview-wrap" onclick="document.getElementById('photoFileInput').click()">
          <div class="photo-preview-inner" id="editPhotoPreview">👤</div>
          <div class="photo-change-badge">📷</div>
        </div>
        <div class="photo-hint">Tap to change photo</div>
        <div class="upload-progress" id="uploadProgress">Uploading photo...</div>
        <input type="file" id="photoFileInput" accept="image/*"/>
      </div>

      <div class="field-group">
        <div class="field-label">Name</div>
        <input class="field-input" id="editName" type="text" placeholder="Your full name" maxlength="40"/>
      </div>

      <div class="field-group">
        <div class="field-label">Age</div>
        <input class="field-input" id="editAge" type="number" placeholder="Your age" min="14" max="30"/>
      </div>

      <div class="field-group">
        <div class="field-label">Location</div>
        <input class="field-input" id="editLocation" type="text" placeholder="e.g. Kathmandu" maxlength="40"/>
      </div>

      <div class="field-group">
        <div class="field-label">Bio</div>
        <textarea class="field-input" id="editBio" placeholder="Write something about yourself..." maxlength="200"></textarea>
      </div>

      <div class="field-group">
        <div class="field-label">Exam / Category</div>
        <select class="field-input" id="editCategory">
          <option value="cee">CEE Aspirant</option>
          <option value="ioe">IOE Aspirant</option>
          <option value="plus2">+2 Student</option>
          <option value="management">Management Student</option>
        </select>
      </div>

      <div class="field-group">
        <div class="field-label">Looking For</div>
        <select class="field-input" id="editLookingFor">
          <option value="friendship">Friendship</option>
          <option value="relationship">Relationship</option>
          <option value="studybuddy">Study Buddy</option>
          <option value="any">Open to Anything</option>
        </select>
      </div>

      <div class="field-group">
        <div class="field-label">Interests (pick any)</div>
        <div class="interests-grid" id="interestsGrid"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveProfile()">
        💾 Save Changes
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item active"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const categoryLabels = {
      cee:'CEE Aspirant', ioe:'IOE Aspirant',
      plus2:'+2 Student', management:'Management Student'
    };
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    const ALL_INTERESTS = [
      '📚 Studying','🎵 Music','🏏 Cricket','⚽ Football',
      '🎮 Gaming','🎨 Art','📷 Photography','✈️ Travel',
      '🍜 Food','💻 Coding','📖 Reading','🏃 Fitness',
      '🎬 Movies','🎤 Singing','🧘 Meditation','🌿 Nature'
    ];

    let currentUserId = null;
    let currentProfile = null;
    let newAvatarUrl = null;

    // ========== CHECK VERIFICATION FUNCTION ==========
    async function checkVerification() {
      try {
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('is_verified')
          .eq('id', currentUserId)
          .single();
        
        if (profile?.is_verified) {
          const badge = document.getElementById('verifiedBadge');
          if (badge) badge.style.display = 'inline-flex';
        }
      } catch(e) {
        console.log('Verification check failed:', e);
      }
    }

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;

      const { data: profile } = await supabaseClient
        .from('profiles').select('*').eq('id', currentUserId).single();
      if (!profile) { window.location.href = 'signup.html'; return; }
      currentProfile = profile;

      // Check if user is verified
      await checkVerification();

      const { data: likes } = await supabaseClient
        .from('likes').select('*').eq('from_user', currentUserId);
      const { data: myLikes } = await supabaseClient
        .from('likes').select('to_user').eq('from_user', currentUserId);
      let matchCount = 0;
      if (myLikes && myLikes.length > 0) {
        const likedIds = myLikes.map(l => l.to_user);
        const { data: mutual } = await supabaseClient
          .from('likes').select('*')
          .eq('to_user', currentUserId).in('from_user', likedIds);
        matchCount = mutual ? mutual.length : 0;
      }
      const { data: msgs } = await supabaseClient
        .from('messages').select('*').eq('from_user', currentUserId);

      const fields = [profile.name, profile.age, profile.gender,
        profile.category, profile.location,
        profile.interests && profile.interests.length >= 3];
      const completion = Math.round(fields.filter(Boolean).length / fields.length * 100);

      render(profile, likes?.length || 0, matchCount, msgs?.length || 0, completion);
      buildInterestsGrid(profile.interests || []);
    }

    function render(p, likes, matches, msgs, completion) {
      const avatarContent = p.avatar_url
        ? `<img src="${p.avatar_url}" alt="${p.name}"/>`
        : genderEmoji[p.gender] || '👤';
      
      // Check if user has is_verified flag
      const isVerified = p.is_verified === true;
      const verifiedBadgeHTML = isVerified ? '<span class="badge badge-gold" id="verifiedBadge">⭐ Verified</span>' : '<span id="verifiedBadge" style="display:none;"></span>';
      
      document.getElementById('profilePage').innerHTML = `
        <div class="profile-hero">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar-inner">${avatarContent}</div>
          </div>
          <div class="name-badge-container">
            <div class="profile-name">${p.name || 'Your Name'}</div>
            ${verifiedBadgeHTML}
          </div>
          <div class="profile-tag">${categoryLabels[p.category] || 'Aspirant'}</div>
          <div class="profile-location">
            📍 ${p.location || 'Nepal'}
            ${p.age ? '• ' + p.age + ' yrs' : ''}
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${completion}%"></div>
          </div>
          <div class="progress-text">Profile ${completion}% complete</div>
        </div>

        <div class="stats-row">
          <div class="stat-box"><strong>${likes}</strong><span>Likes</span></div>
          <div class="stat-box"><strong>${matches}</strong><span>Matches</span></div>
          <div class="stat-box"><strong>${msgs}</strong><span>Messages</span></div>
        </div>

        <div class="info-card">
          <div class="info-card-title">👤 Personal Info</div>
          <div class="info-row">
            <span class="info-label">Name</span>
            <span class="info-val">${p.name || '—'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Age</span>
            <span class="info-val">${p.age || '—'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Gender</span>
            <span class="info-val">${p.gender
              ? p.gender.charAt(0).toUpperCase() + p.gender.slice(1) : '—'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Location</span>
            <span class="info-val">${p.location || '—'}</span>
          </div>
          ${p.bio ? `<div class="info-row">
            <span class="info-label">Bio</span>
            <span class="info-val">${p.bio}</span>
          </div>` : ''}
        </div>

        <div class="info-card">
          <div class="info-card-title">🎓 Study Info</div>
          <div class="info-row">
            <span class="info-label">Category</span>
            <span class="info-val">${categoryLabels[p.category] || '—'}</span>
          </div>
             <div class="info-row">
            <span class="info-label">Looking For</span>
            <span class="info-val">${p.looking_for
              ? p.looking_for.charAt(0).toUpperCase() + p.looking_for.slice(1) : '—'}</span>
          </div>
        </div>

        <div class="info-card">
          <div class="info-card-title">❤️ Interests</div>
          <div class="tags-wrap">
            ${(p.interests || []).map(i => `<span class="tag">${i}</span>`).join('')
              || '<span style="color:rgba(255,255,255,0.3);font-size:0.82rem">No interests added</span>'}
          </div>
        </div>

        <div class="action-btns">
          <button class="edit-btn" onclick="openEdit()">✏️ Edit Profile</button>
          <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>`;
    }

    function buildInterestsGrid(selected) {
      document.getElementById('interestsGrid').innerHTML = ALL_INTERESTS.map(tag => `
        <div class="int-tag ${selected.includes(tag) ? 'selected' : ''}"
          onclick="toggleInterest(this, '${tag}')">${tag}</div>
      `).join('');
    }

    function toggleInterest(el, tag) {
      el.classList.toggle('selected');
    }

    function getSelectedInterests() {
      return [...document.querySelectorAll('.int-tag.selected')].map(el => el.textContent.trim());
    }

    function openEdit() {
      const p = currentProfile;
      document.getElementById('editName').value = p.name || '';
      document.getElementById('editAge').value = p.age || '';
      document.getElementById('editLocation').value = p.location || '';
      document.getElementById('editBio').value = p.bio || '';
      document.getElementById('editCategory').value = p.category || 'cee';
      document.getElementById('editLookingFor').value = p.looking_for || 'friendship';

      const preview = document.getElementById('editPhotoPreview');
      preview.innerHTML = p.avatar_url
        ? `<img src="${p.avatar_url}" alt="photo"/>`
        : genderEmoji[p.gender] || '👤';
      newAvatarUrl = null;

      buildInterestsGrid(p.interests || []);

      document.getElementById('editSheet').classList.add('open');
      document.getElementById('sheetOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeEdit() {
      document.getElementById('editSheet').classList.remove('open');
      document.getElementById('sheetOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('photoFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showToast('❌ Photo must be under 5MB'); return; }

      const progressEl = document.getElementById('uploadProgress');
      progressEl.style.display = 'block';
      progressEl.textContent = 'Uploading photo...';

      const ext = file.name.split('.').pop();
      const path = `${currentUserId}/avatar_${Date.now()}.${ext}`;

      const { error } = await supabaseClient.storage
        .from('avatars').upload(path, file, { upsert: true });

      if (error) {
        progressEl.textContent = '❌ Upload failed';
        setTimeout(() => { progressEl.style.display = 'none'; }, 2000);
        return;
      }

      const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(path);
      newAvatarUrl = urlData.publicUrl;

      document.getElementById('editPhotoPreview').innerHTML =
        `<img src="${newAvatarUrl}" alt="photo"/>`;
      progressEl.textContent = '✅ Photo ready!';
      setTimeout(() => { progressEl.style.display = 'none'; }, 1500);
    });

    async function saveProfile() {
      const saveBtn = document.getElementById('saveBtn');
      const name = document.getElementById('editName').value.trim();
      const age = parseInt(document.getElementById('editAge').value);
      const location = document.getElementById('editLocation').value.trim();
      const bio = document.getElementById('editBio').value.trim();
      const category = document.getElementById('editCategory').value;
      const looking_for = document.getElementById('editLookingFor').value;
      const interests = getSelectedInterests();

      if (!name) { showToast('❌ Name is required'); return; }
      if (age && (age < 14 || age > 30)) { showToast('❌ Please enter a valid age'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const updates = { name, age: age || null, location, bio, category, looking_for, interests };
      if (newAvatarUrl) updates.avatar_url = newAvatarUrl;

      const { error } = await supabaseClient
        .from('profiles').update(updates).eq('id', currentUserId);

      if (error) {
        showToast('❌ Failed to save. Try again.');
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save Changes';
        return;
      }

      currentProfile = { ...currentProfile, ...updates };

      const fields = [currentProfile.name, currentProfile.age, currentProfile.gender,
        currentProfile.category, currentProfile.location,
        currentProfile.interests && currentProfile.interests.length >= 3];
      const completion = Math.round(fields.filter(Boolean).length / fields.length * 100);

      const { data: likes } = await supabaseClient
        .from('likes').select('*').eq('from_user', currentUserId);
      const { data: myLikes } = await supabaseClient
        .from('likes').select('to_user').eq('from_user', currentUserId);
      let matchCount = 0;
      if (myLikes && myLikes.length > 0) {
        const likedIds = myLikes.map(l => l.to_user);
        const { data: mutual } = await supabaseClient
          .from('likes').select('*')
          .eq('to_user', currentUserId).in('from_user', likedIds);
        matchCount = mutual ? mutual.length : 0;
      }
      const { data: msgs } = await supabaseClient
        .from('messages').select('*').eq('from_user', currentUserId);

      render(currentProfile, likes?.length || 0, matchCount, msgs?.length || 0, completion);
      closeEdit();
      showToast('✅ Profile saved!');

      saveBtn.disabled = false;
      saveBtn.textContent = '💾 Save Changes';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function logout() {
      if (confirm('Are you sure you want to logout?')) {
        await supabaseClient.auth.signOut();
        localStorage.clear();
        window.location.href = 'index.html';
      }
    }

    init();



  
  function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const themeToggle = document.getElementById('themeToggle');
    
    if (currentTheme === 'dark') {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      if (themeToggle) themeToggle.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      if (themeToggle) themeToggle.textContent = '☀️';
    }
  }
  
  const savedTheme = localStorage.getItem('theme');
  const themeToggle = document.getElementById('themeToggle');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (themeToggle) themeToggle.textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (themeToggle) themeToggle.textContent = '🌙';
  }
  


    
  <!-- Page transition effect -->

    document.body.classList.add('fade-in');
    
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (navbar) {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }
    });
  </script>

</body>
</html>
