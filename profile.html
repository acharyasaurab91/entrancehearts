<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Profile — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    /* ========================================
       PROFILE - PREMIUM DARK THEME
       Pink Gradient | User Profile Management
       ======================================== */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 20, 147, 0.2);
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar.scrolled {
      padding: 12px 32px;
      background: rgba(10, 10, 15, 0.95);
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 90px 16px 100px;
    }
    
    .profile-hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .profile-avatar-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      padding: 3px;
      margin: 0 auto 16px;
    }
    .profile-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      overflow: hidden;
    }
    .profile-avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .name-badge-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .profile-name {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-gold {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
      border: 1px solid rgba(255, 215, 0, 0.5);
      color: #FFD700;
    }
    .profile-tag {
      display: inline-block;
      background: rgba(255, 20, 147, 0.12);
      border: 1px solid rgba(255, 20, 147, 0.25);
      color: #FF6B9D;
      padding: 4px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .profile-location {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.82rem;
    }
    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      margin-top: 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border-radius: 2px;
      transition: width 1s ease;
    }
    .progress-text {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.3);
      text-align: right;
      margin-top: 4px;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 20px;
      padding: 16px 10px;
      text-align: center;
      transition: all 0.2s;
    }
    .stat-box:hover {
      border-color: rgba(255,20,147,0.4);
      transform: translateY(-2px);
    }
    .stat-box strong {
      display: block;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-box span {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.3);
    }
    
    .info-card {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .info-card-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #FF6B9D;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,20,147,0.1);
    }
    .info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .info-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .info-val {
      font-size: 0.82rem;
      font-weight: 600;
      text-align: right;
      max-width: 60%;
    }
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      color: rgba(255, 255, 255, 0.7);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
    }
    
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .edit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      border-radius: 100px;
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .edit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3);
    }
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover {
      border-color: #FF1493;
      color: #FF6B9D;
    }

    /* Edit Sheet */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 300;
    }
    .sheet-overlay.open {
      display: block;
    }
    .edit-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: #141423;
      border-radius: 28px 28px 0 0;
      border-top: 1px solid rgba(255,20,147,0.3);
      z-index: 400;
      transform: translateY(100%);
      transition: transform 0.35s ease;
      max-height: 90vh;
      overflow-y: auto;
      padding-bottom: 30px;
    }
    .edit-sheet.open {
      transform: translateY(0);
    }
    .sheet-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      margin: 14px auto 0;
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 10px;
      border-bottom: 1px solid rgba(255,20,147,0.15);
    }
    .sheet-title {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .sheet-close {
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      padding: 4px;
    }
    .sheet-body {
      padding: 20px;
    }
    
    .photo-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .photo-preview-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      padding: 3px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .photo-preview-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      overflow: hidden;
    }
    .photo-preview-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .photo-change-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      border: 2px solid #141423;
    }
    .photo-hint {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
    }
    #photoFileInput {
      display: none;
    }
    .upload-progress {
      font-size: 0.75rem;
      color: #FF6B9D;
      margin-top: 6px;
      display: none;
    }
    
    .field-group {
      margin-bottom: 18px;
    }
    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 14px;
      color: white;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    .field-input:focus {
      border-color: #FF1493;
      background: rgba(255, 20, 147, 0.05);
    }
    textarea.field-input {
      resize: none;
      height: 90px;
      line-height: 1.5;
    }
    select.field-input {
      appearance: none;
      cursor: pointer;
    }
    
    .interests-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .int-tag {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,20,147,0.2);
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.03);
    }
    .int-tag.selected {
      background: rgba(255, 20, 147, 0.15);
      border-color: rgba(255, 20, 147, 0.5);
      color: #FF6B9D;
      font-weight: 600;
    }
    
    .save-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      border-radius: 100px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s;
    }
    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3);
    }
    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,20,147,0.2);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 20px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 600;
      transition: all 0.2s;
      padding: 6px 12px;
      border-radius: 40px;
    }
    .nav-item span:first-child {
      font-size: 1.3rem;
    }
    .nav-item:hover {
      color: #FF6B9D;
      background: rgba(255, 20, 147, 0.1);
    }
    .nav-item.active {
      color: #FF6B9D;
    }
    
    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div style="max-width: 1280px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo">💕 EntranceHearts</a>
      <div style="display: flex; gap: 12px; align-items: center;">
        <a href="browse.html" class="btn-ghost" style="color: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 100px; text-decoration: none;">🔥 Discover</a>
        <a href="chat.html" class="btn-ghost" style="color: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 100px; text-decoration: none;">💬 Chats</a>
      </div>
    </div>
  </nav>

  <div class="page" id="profilePage">
    <div class="loading-state">
      <div style="font-size:3rem; margin-bottom:14px">💕</div>
      <p style="color: rgba(255,255,255,0.4)">Loading profile...</p>
    </div>
  </div>

  <!-- Edit Sheet -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeEdit()"></div>
  <div class="edit-sheet" id="editSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">✏️ Edit Profile</div>
      <div class="sheet-close" onclick="closeEdit()">✕</div>
    </div>
    <div class="sheet-body">

      <div class="photo-picker">
        <div class="photo-preview-wrap" onclick="document.getElementById('photoFileInput').click()">
          <div class="photo-preview-inner" id="editPhotoPreview">👤</div>
          <div class="photo-change-badge">📷</div>
        </div>
        <div class="photo-hint">Tap to change photo</div>
        <div class="upload-progress" id="uploadProgress">Uploading photo...</div>
        <input type="file" id="photoFileInput" accept="image/*"/>
      </div>

      <div class="field-group">
        <div class="field-label">Name</div>
        <input class="field-input" id="editName" type="text" placeholder="Your full name" maxlength="40"/>
      </div>

      <div class="field-group">
        <div class="field-label">Age</div>
        <input class="field-input" id="editAge" type="number" placeholder="Your age" min="14" max="30"/>
      </div>

      <div class="field-group">
        <div class="field-label">Location</div>
        <input class="field-input" id="editLocation" type="text" placeholder="e.g. Kathmandu" maxlength="40"/>
      </div>

      <div class="field-group">
        <div class="field-label">Bio</div>
        <textarea class="field-input" id="editBio" placeholder="Write something about yourself..." maxlength="200"></textarea>
      </div>

      <div class="field-group">
        <div class="field-label">Exam / Category</div>
        <select class="field-input" id="editCategory">
          <option value="cee">CEE Aspirant</option>
          <option value="ioe">IOE Aspirant</option>
          <option value="plus2">+2 Student</option>
          <option value="management">Management Student</option>
        </select>
      </div>

      <div class="field-group">
        <div class="field-label">Looking For</div>
        <select class="field-input" id="editLookingFor">
          <option value="friendship">Friendship</option>
          <option value="relationship">Relationship</option>
          <option value="studybuddy">Study Buddy</option>
          <option value="any">Open to Anything</option>
        </select>
      </div>

      <div class="field-group">
        <div class="field-label">Interests</div>
        <div class="interests-grid" id="interestsGrid"></div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveProfile()">💾 Save Changes</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item active"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const categoryLabels = {
      cee:'CEE Aspirant', ioe:'IOE Aspirant',
      plus2:'+2 Student', management:'Management Student'
    };
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    const ALL_INTERESTS = [
      '📚 Studying','🎵 Music','🏏 Cricket','⚽ Football',
      '🎮 Gaming','🎨 Art','📷 Photography','✈️ Travel',
      '🍜 Food','💻 Coding','📖 Reading','🏃 Fitness',
      '🎬 Movies','🎤 Singing','🧘 Meditation','🌿 Nature'
    ];

    let currentUserId = null;
    let currentProfile = null;
    let newAvatarUrl = null;

    async function checkVerification() {
      try {
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('is_verified')
          .eq('id', currentUserId)
          .single();
        if (profile?.is_verified) {
          const badge = document.getElementById('verifiedBadge');
          if (badge) badge.style.display = 'inline-flex';
        }
      } catch(e) {
        console.log('Verification check failed:', e);
      }
    }

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;

      const { data: profile } = await supabaseClient
        .from('profiles').select('*').eq('id', currentUserId).single();
      if (!profile) { window.location.href = 'signup.html'; return; }
      currentProfile = profile;

      await checkVerification();

      const { data: likes } = await supabaseClient
        .from('likes').select('*').eq('from_user', currentUserId);
      const { data: myLikes } = await supabaseClient
        .from('likes').select('to_user').eq('from_user', currentUserId);
      let matchCount = 0;
      if (myLikes && myLikes.length > 0) {
        const likedIds = myLikes.map(l => l.to_user);
        const { data: mutual } = await supabaseClient
          .from('likes').select('*')
          .eq('to_user', currentUserId).in('from_user', likedIds);
        matchCount = mutual ? mutual.length : 0;
      }
      const { data: msgs } = await supabaseClient
        .from('messages').select('*').eq('from_user', currentUserId);

      const fields = [profile.name, profile.age, profile.gender,
        profile.category, profile.location,
        profile.interests && profile.interests.length >= 3];
      const completion = Math.round(fields.filter(Boolean).length / fields.length * 100);

      render(profile, likes?.length || 0, matchCount, msgs?.length || 0, completion);
      buildInterestsGrid(profile.interests || []);
    }

    function render(p, likes, matches, msgs, completion) {
      const avatarContent = p.avatar_url
        ? `<img src="${p.avatar_url}" alt="${p.name}"/>`
        : genderEmoji[p.gender] || '👤';
      
           const isVerified = p.is_verified === true;
      const verifiedBadgeHTML = isVerified ? '<span class="badge badge-gold" id="verifiedBadge">⭐ Verified</span>' : '<span id="verifiedBadge" style="display:none;"></span>';
      
      document.getElementById('profilePage').innerHTML = `
        <div class="profile-hero">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar-inner">${avatarContent}</div>
          </div>
          <div class="name-badge-container">
            <div class="profile-name">${p.name || 'Your Name'}</div>
            ${verifiedBadgeHTML}
          </div>
          <div class="profile-tag">${categoryLabels[p.category] || 'Aspirant'}</div>
          <div class="profile-location">
            📍 ${p.location || 'Nepal'}
            ${p.age ? '• ' + p.age + ' yrs' : ''}
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${completion}%"></div>
          </div>
          <div class="progress-text">Profile ${completion}% complete</div>
        </div>

        <div class="stats-row">
          <div class="stat-box"><strong>${likes}</strong><span>Likes</span></div>
          <div class="stat-box"><strong>${matches}</strong><span>Matches</span></div>
          <div class="stat-box"><strong>${msgs}</strong><span>Messages</span></div>
        </div>

        <div class="info-card">
          <div class="info-card-title">👤 Personal Info</div>
          <div class="info-row"><span class="info-label">Name</span><span class="info-val">${p.name || '—'}</span></div>
          <div class="info-row"><span class="info-label">Age</span><span class="info-val">${p.age || '—'}</span></div>
          <div class="info-row"><span class="info-label">Gender</span><span class="info-val">${p.gender ? p.gender.charAt(0).toUpperCase() + p.gender.slice(1) : '—'}</span></div>
          <div class="info-row"><span class="info-label">Location</span><span class="info-val">${p.location || '—'}</span></div>
          ${p.bio ? `<div class="info-row"><span class="info-label">Bio</span><span class="info-val">${p.bio}</span></div>` : ''}
        </div>

        <div class="info-card">
          <div class="info-card-title">🎓 Study Info</div>
          <div class="info-row"><span class="info-label">Category</span><span class="info-val">${categoryLabels[p.category] || '—'}</span></div>
          <div class="info-row"><span class="info-label">Looking For</span><span class="info-val">${p.looking_for ? p.looking_for.charAt(0).toUpperCase() + p.looking_for.slice(1) : '—'}</span></div>
        </div>

        <div class="info-card">
          <div class="info-card-title">❤️ Interests</div>
          <div class="tags-wrap">${(p.interests || []).map(i => `<span class="tag">${i}</span>`).join('') || '<span style="color:rgba(255,255,255,0.3);font-size:0.82rem">No interests added</span>'}</div>
        </div>

        <div class="action-btns">
          <button class="edit-btn" onclick="openEdit()">✏️ Edit Profile</button>
          <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>`;
    }

    function buildInterestsGrid(selected) {
      document.getElementById('interestsGrid').innerHTML = ALL_INTERESTS.map(tag => `
        <div class="int-tag ${selected.includes(tag) ? 'selected' : ''}" onclick="toggleInterest(this, '${tag}')">${tag}</div>
      `).join('');
    }

    function toggleInterest(el, tag) {
      el.classList.toggle('selected');
    }

    function getSelectedInterests() {
      return [...document.querySelectorAll('.int-tag.selected')].map(el => el.textContent.trim());
    }

    function openEdit() {
      const p = currentProfile;
      document.getElementById('editName').value = p.name || '';
      document.getElementById('editAge').value = p.age || '';
      document.getElementById('editLocation').value = p.location || '';
      document.getElementById('editBio').value = p.bio || '';
      document.getElementById('editCategory').value = p.category || 'cee';
      document.getElementById('editLookingFor').value = p.looking_for || 'friendship';

      const preview = document.getElementById('editPhotoPreview');
      preview.innerHTML = p.avatar_url ? `<img src="${p.avatar_url}" alt="photo"/>` : genderEmoji[p.gender] || '👤';
      newAvatarUrl = null;

      buildInterestsGrid(p.interests || []);

      document.getElementById('editSheet').classList.add('open');
      document.getElementById('sheetOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeEdit() {
      document.getElementById('editSheet').classList.remove('open');
      document.getElementById('sheetOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('photoFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showToast('❌ Photo must be under 5MB'); return; }

      const progressEl = document.getElementById('uploadProgress');
      progressEl.style.display = 'block';
      progressEl.textContent = 'Uploading photo...';

      const ext = file.name.split('.').pop();
      const path = `${currentUserId}/avatar_${Date.now()}.${ext}`;

      const { error } = await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true });

      if (error) {
        progressEl.textContent = '❌ Upload failed';
        setTimeout(() => { progressEl.style.display = 'none'; }, 2000);
        return;
      }

      const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(path);
      newAvatarUrl = urlData.publicUrl;

      document.getElementById('editPhotoPreview').innerHTML = `<img src="${newAvatarUrl}" alt="photo"/>`;
      progressEl.textContent = '✅ Photo ready!';
      setTimeout(() => { progressEl.style.display = 'none'; }, 1500);
    });

    async function saveProfile() {
      const saveBtn = document.getElementById('saveBtn');
      const name = document.getElementById('editName').value.trim();
      const age = parseInt(document.getElementById('editAge').value);
      const location = document.getElementById('editLocation').value.trim();
      const bio = document.getElementById('editBio').value.trim();
      const category = document.getElementById('editCategory').value;
      const looking_for = document.getElementById('editLookingFor').value;
      const interests = getSelectedInterests();

      if (!name) { showToast('❌ Name is required'); return; }
      if (age && (age < 14 || age > 30)) { showToast('❌ Please enter a valid age'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const updates = { name, age: age || null, location, bio, category, looking_for, interests };
      if (newAvatarUrl) updates.avatar_url = newAvatarUrl;

      const { error } = await supabaseClient.from('profiles').update(updates).eq('id', currentUserId);

      if (error) {
        showToast('❌ Failed to save. Try again.');
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 Save Changes';
        return;
      }

      currentProfile = { ...currentProfile, ...updates };

      const fields = [currentProfile.name, currentProfile.age, currentProfile.gender,
        currentProfile.category, currentProfile.location,
        currentProfile.interests && currentProfile.interests.length >= 3];
      const completion = Math.round(fields.filter(Boolean).length / fields.length * 100);

      const { data: likes } = await supabaseClient.from('likes').select('*').eq('from_user', currentUserId);
      const { data: myLikes } = await supabaseClient.from('likes').select('to_user').eq('from_user', currentUserId);
      let matchCount = 0;
      if (myLikes && myLikes.length > 0) {
        const likedIds = myLikes.map(l => l.to_user);
        const { data: mutual } = await supabaseClient.from('likes').select('*').eq('to_user', currentUserId).in('from_user', likedIds);
        matchCount = mutual ? mutual.length : 0;
      }
      const { data: msgs } = await supabaseClient.from('messages').select('*').eq('from_user', currentUserId);

      render(currentProfile, likes?.length || 0, matchCount, msgs?.length || 0, completion);
      closeEdit();
      showToast('✅ Profile saved!');

      saveBtn.disabled = false;
      saveBtn.textContent = '💾 Save Changes';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function logout() {
      if (confirm('Are you sure you want to logout?')) {
        await supabaseClient.auth.signOut();
        localStorage.clear();
        window.location.href = 'index.html';
      }
    }

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else if (navbar) {
        navbar.classList.remove('scrolled');
      }
    });

    init();
  </script>
</body>
</html>
