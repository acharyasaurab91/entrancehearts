<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Update Password — EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-container {
      max-width: 400px;
      width: 90%;
      padding: 40px;
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: 32px;
      text-align: center;
    }
    h2 {
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: 14px;
      color: white;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      border-radius: 100px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #ff4444; font-size: 0.8rem; margin-top: 8px; display: none; }
    .success { color: #4caf50; font-size: 0.8rem; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="reset-container">
    <div style="font-size: 3rem; margin-bottom: 16px;">🔐</div>
    <h2>Create New Password</h2>
    <p>Enter your new password below</p>
    
    <input type="password" id="newPassword" placeholder="New password (min 8 characters)">
    <input type="password" id="confirmPassword" placeholder="Confirm password">
    
    <button onclick="updatePassword()">Update Password</button>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
  </div>

  <script>
    async function updatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }
      
      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });
        
        if (error) throw error;
        
        showSuccess('Password updated! Redirecting to login...');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        showError(err.message || 'Failed to update password');
      }
    }
    
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
