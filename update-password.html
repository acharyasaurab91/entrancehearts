<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #141423; padding: 40px; border-radius: 32px; text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,20,147,0.3); }
    h2 { margin-bottom: 8px; background: linear-gradient(135deg, #FF1493, #FF6B9D); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    input { width: 100%; padding: 14px; margin-bottom: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,20,147,0.3); border-radius: 14px; color: white; font-size: 1rem; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #FF1493, #FF6B9D); border: none; border-radius: 100px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,20,147,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <div style="font-size: 3rem; margin-bottom: 16px;">🔐</div>
    <h2>Create New Password</h2>
    <p>Enter your new password below</p>
    <input type="password" id="newPassword" placeholder="New password (min 8 characters)">
    <input type="password" id="confirmPassword" placeholder="Confirm password">
    <button onclick="updatePassword()">Update Password</button>
    <div id="errorMsg" style="color: #ff4444; margin-top: 12px; display: none;"></div>
  </div>
  <script>
    async function updatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'none';
      if (newPassword.length < 8) { errorDiv.textContent = 'Password must be at least 8 characters'; errorDiv.style.display = 'block'; return; }
      if (newPassword !== confirmPassword) { errorDiv.textContent = 'Passwords do not match'; errorDiv.style.display = 'block'; return; }
      const btn = event.target; btn.disabled = true; btn.textContent = 'Updating...';
      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        alert('✅ Password updated! Redirecting to login...');
        window.location.href = 'login.html';
      } catch (err) { errorDiv.textContent = '❌ ' + (err.message || 'Failed to update password'); errorDiv.style.display = 'block'; btn.disabled = false; btn.textContent = 'Update Password'; }
    }
  </script>
</body>
</html>
