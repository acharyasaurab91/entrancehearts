<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confession Wall 💌 - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0f;
      color: white;
    }

    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(20px);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      padding: 10px 20px;
      background: rgba(10, 10, 15, 0.98);
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .admin-badge {
      background: rgba(230, 57, 70, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #ff6b9d;
    }

    .btn-ghost {
      color: rgba(255, 255, 255, 0.7);
      padding: 10px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: transparent;
      cursor: pointer;
    }

    .btn-ghost:hover {
      border-color: #ff6b9d;
      color: #ff6b9d;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px 100px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ff6b9d, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .hero p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    .post-form {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .post-form textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 100px;
    }

    .post-form textarea:focus {
      outline: none;
      border-color: #ff6b9d;
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .char-count {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.7rem;
    }

    .post-btn {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .post-btn:hover {
      transform: scale(1.02);
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 18px;
      border-radius: 50px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border-color: transparent;
      color: white;
    }

    .confessions-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .confession-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 18px;
      transition: all 0.2s;
    }

    .confession-card:hover {
      border-color: rgba(255, 107, 157, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .anonymous-badge {
      background: rgba(255, 107, 157, 0.15);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 0.7rem;
      color: #ff6b9d;
    }

    .timestamp {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .confession-text {
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .exam-tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.5);
      margin-right: 8px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.7rem;
      margin-left: 8px;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #e63946;
    }

    .like-section {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .like-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .like-btn:hover {
      color: #ff6b9d;
    }

    .reactions-row {
      display: flex;
      gap: 12px;
      margin: 8px 0;
      flex-wrap: wrap;
    }

    .reaction-display {
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 50px;
      font-size: 0.7rem;
    }

    .comments-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .comment-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .comment-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 8px 14px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
    }

    .comment-input:focus {
      outline: none;
      border-color: #ff6b9d;
    }

    .comment-btn {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border: none;
      padding: 8px 16px;
      border-radius: 50px;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .comments-list {
      margin-top: 8px;
    }

    .comment-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .comment-text {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      flex: 1;
    }

    .comment-anonymous {
      font-size: 0.6rem;
      color: #ff6b9d;
      margin-right: 8px;
    }

    .comment-delete {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.7rem;
    }

    .comment-delete:hover {
      color: #e63946;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.4);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid #ff6b9d;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      z-index: 200;
      display: none;
    }

    .toast.show {
      display: block;
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .owner-badge {
      font-size: 0.6rem;
      color: #ff6b9d;
      margin-left: 5px;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a2e;
      border: 1px solid rgba(255, 107, 157, 0.3);
      border-radius: 24px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">💌 Confession Wall</div>
    <div style="display: flex; gap: 10px; align-items: center;">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
    <div>
      <span id="adminIndicator" class="admin-badge" style="display: none;">👑 Admin Mode</span>
      <button onclick="toggleAdminMode()" style="background:none;border:none;color:#ff6b9d;cursor:pointer;font-size:0.7rem;">Admin</button>
    </div>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>Anonymous Confessions 💕</h1>
      <p>Share your feelings, comment anonymously, and connect with aspirants</p>
      <p style="font-size:0.7rem;margin-top:5px;">⚠️ Only YOU and Admin can delete your confession</p>
    </div>

    <div class="post-form">
      <textarea id="confessionInput" placeholder="Share your confession, feelings, or thoughts... (Everyone can see this anonymously)"></textarea>
      <div class="form-footer">
        <span class="char-count" id="charCount">0/500</span>
        <div style="display: flex; gap: 8px;">
          <button class="post-btn" onclick="postConfession()">Post Confession 💌</button>
          <button type="button" class="btn-ghost" onclick="openGifPicker(addGifToInput)" style="padding: 10px 16px;">🎬 GIF</button>
        </div>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">All Confessions</button>
      <button class="filter-btn" data-filter="CEE">🎓 CEE</button>
      <button class="filter-btn" data-filter="IOE">⚙️ IOE</button>
      <button class="filter-btn" data-filter="+2">📚 +2</button>
      <button class="filter-btn" data-filter="Management">💼 Management</button>
    </div>

    <div id="confessionsList" class="confessions-list"></div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- GIF Modal -->
  <div id="gifModal" class="modal-overlay">
    <div class="modal-content">
      <h3 style="margin-bottom: 16px;">🎬 Choose a GIF</h3>
      <input type="text" id="gifSearch" placeholder="Search GIFs..." style="width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; margin-bottom: 16px;">
      <div id="gifResults" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 400px; overflow-y: auto;"></div>
      <button onclick="closeGifPicker()" style="margin-top: 16px; width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; cursor: pointer;">Cancel</button>
    </div>
  </div>

  <script>
    let confessions = [];
    let isAdmin = false;
    const ADMIN_CODE = "drsaurab@2022";
    
    let currentUserId = localStorage.getItem('eh_user_id');
    if (!currentUserId) {
      currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('eh_user_id', currentUserId);
    }

    function toggleAdminMode() {
      if (!isAdmin) {
        const code = prompt("Enter Admin Code:");
        if (code === ADMIN_CODE) {
          isAdmin = true;
          document.getElementById('adminIndicator').style.display = 'inline-block';
          showToast("👑 Admin mode activated!");
          renderConfessions();
        } else {
          showToast("❌ Wrong admin code!");
        }
      } else {
        isAdmin = false;
        document.getElementById('adminIndicator').style.display = 'none';
        showToast("Admin mode deactivated");
        renderConfessions();
      }
    }

    function loadConfessions() {
      const saved = localStorage.getItem('entrancehearts_confessions_v3');
      if (saved) {
        confessions = JSON.parse(saved);
      } else {
        confessions = [
          {
            id: 1,
            text: "I have a huge crush on someone in my CEE coaching class but too shy to say it. If you're from Himalayan Academy and reading this... hi 👀",
            exam: "CEE",
            timestamp: new Date(Date.now() - 86400000).toISOString(),
            likes: 12,
            userId: 'user_demo_1',
            reactions: { '❤️': 5, '😂': 2 },
            comments: [
              { id: 101, text: "Same here! Good luck 🤞", timestamp: Date.now() - 70000000, userId: 'user_demo_2' },
              { id: 102, text: "Just go for it!", timestamp: Date.now() - 60000000, userId: 'user_demo_3' }
            ]
          },
          {
            id: 2,
            text: "Being an IOE aspirant is lonely. Sometimes I just want someone to study with at 2 AM. Anyone else feel the same?",
            exam: "IOE",
            timestamp: new Date(Date.now() - 172800000).toISOString(),
            likes: 34,
            userId: 'user_demo_2',
            reactions: { '😢': 3, '❤️': 8 },
            comments: []
          },
          {
            id: 3,
            text: "To the girl who sits in the front row at Pulchowk library, I think you're beautiful. Hope this confession reaches you somehow ❤️",
            exam: "IOE",
            timestamp: new Date(Date.now() - 259200000).toISOString(),
            likes: 28,
            userId: 'user_demo_3',
            reactions: { '❤️': 12, '😮': 4 },
            comments: []
          }
        ];
        saveConfessions();
      }
      renderConfessions();
    }

    function saveConfessions() {
      localStorage.setItem('entrancehearts_confessions_v3', JSON.stringify(confessions));
    }

    function postConfession() {
      const input = document.getElementById('confessionInput');
      const text = input.value.trim();
      
      if (!text) {
        showToast("Please write something before posting 💭");
        return;
      }
      
      if (text.length < 10) {
        showToast("Write at least 10 characters 🙏");
        return;
      }

      let exam = "All";
      const lowerText = text.toLowerCase();
      if (lowerText.includes("cee") || lowerText.includes("mbbs") || lowerText.includes("medical")) exam = "CEE";
      else if (lowerText.includes("ioe") || lowerText.includes("engineering") || lowerText.includes("pulchowk")) exam = "IOE";
      else if (lowerText.includes("+2") || lowerText.includes("plus two")) exam = "+2";
      else if (lowerText.includes("management") || lowerText.includes("bbs") || lowerText.includes("bba")) exam = "Management";

      const newConfession = {
        id: Date.now(),
        text: text,
        exam: exam,
        timestamp: new Date().toISOString(),
        likes: 0,
        userId: currentUserId,
        reactions: {},
        comments: []
      };

      confessions.unshift(newConfession);
      saveConfessions();
      
      input.value = "";
      document.getElementById('charCount').innerText = "0/500";
      showToast("💌 Your confession has been posted anonymously!");
      renderConfessions();
    }

    function canDeleteConfession(confession) {
      return isAdmin || confession.userId === currentUserId;
    }

    function canDeleteComment(comment) {
      return isAdmin || comment.userId === currentUserId;
    }

    function deleteConfession(id) {
      const confession = confessions.find(c => c.id === id);
      if (!confession) return;
      
      if (canDeleteConfession(confession)) {
        if (confirm("Delete this confession? This cannot be undone.")) {
          confessions = confessions.filter(c => c.id !== id);
          saveConfessions();
          renderConfessions();
          showToast("🗑️ Confession deleted");
        }
      } else {
        showToast("❌ You can only delete your own confessions!");
      }
    }

    function likeConfession(id) {
      const confession = confessions.find(c => c.id === id);
      if (confession) {
        confession.likes++;
        saveConfessions();
        renderConfessions();
      }
    }

    function addReaction(confessionId, emoji) {
      const confession = confessions.find(c => c.id === confessionId);
      if (confession) {
        if (!confession.reactions) confession.reactions = {};
        confession.reactions[emoji] = (confession.reactions[emoji] || 0) + 1;
        saveConfessions();
        renderConfessions();
      }
    }

    function addComment(confessionId) {
      const input = document.getElementById(`comment-input-${confessionId}`);
      const text = input.value.trim();
      
      if (!text) {
        showToast("Please write a comment");
        return;
      }
      
      if (text.length < 2) {
        showToast("Comment too short");
        return;
      }

      const confession = confessions.find(c => c.id === confessionId);
      if (confession) {
        const newComment = {
          id: Date.now(),
          text: text,
          timestamp: Date.now(),
          userId: currentUserId
        };
        confession.comments.push(newComment);
        saveConfessions();
        input.value = "";
        renderConfessions();
        showToast("💬 Anonymous comment added!");
      }
    }

    function deleteComment(confessionId, commentId) {
      const confession = confessions.find(c => c.id === confessionId);
      if (confession) {
        const comment = confession.comments.find(c => c.id === commentId);
        if (comment && canDeleteComment(comment)) {
          confession.comments = confession.comments.filter(c => c.id !== commentId);
          saveConfessions();
          renderConfessions();
          showToast("Comment deleted");
        } else {
          showToast("❌ You can only delete your own comments!");
        }
      }
    }

    let currentFilter = "all";
    let expandedComments = {};

    function toggleComments(confessionId) {
      expandedComments[confessionId] = !expandedComments[confessionId];
      renderConfessions();
    }

    function renderConfessions() {
      const container = document.getElementById('confessionsList');
      let filtered = confessions;
      
      if (currentFilter !== "all") {
        filtered = confessions.filter(c => c.exam === currentFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><i>💭</i><p>No confessions yet. Be the first to share your feelings!</p></div>`;
        return;
      }

            container.innerHTML = filtered.map(confession => {
        const commentCount = confession.comments.length;
        const isExpanded = expandedComments[confession.id];
        const userOwnsConfession = confession.userId === currentUserId;
        const showDelete = canDeleteConfession(confession);
        
        // Build reactions HTML
        let reactionsHtml = '';
        if (confession.reactions && Object.keys(confession.reactions).length > 0) {
          reactionsHtml = `<div class="reactions-row">${Object.entries(confession.reactions).map(([emoji, count]) => `<span class="reaction-display">${emoji} ${count}</span>`).join('')}</div>`;
        }
        
        return `
          <div class="confession-card">
            <div class="card-header">
              <div>
                <span class="anonymous-badge">🕊️ Anonymous ${userOwnsConfession ? '<span class="owner-badge">(Your confession)</span>' : ''}</span>
              </div>
              <div>
                <span class="timestamp">${formatTime(confession.timestamp)}</span>
                ${showDelete ? `<button class="delete-btn" onclick="deleteConfession(${confession.id})">🗑️ Delete</button>` : ''}
              </div>
            </div>
            <div class="confession-text">${escapeHtml(confession.text)}</div>
            <div><span class="exam-tag">${confession.exam !== "All" ? confession.exam : "General"}</span></div>
            
            <div class="like-section">
              <button class="like-btn" onclick="likeConfession(${confession.id})">❤️ ${confession.likes}</button>
              <button class="like-btn" onclick="toggleComments(${confession.id})">💬 ${commentCount} ${commentCount === 1 ? 'Comment' : 'Comments'}</button>
            </div>
            
            <div class="reactions-row">
              <button class="like-btn" onclick="addReaction(${confession.id}, '❤️')">❤️</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😂')">😂</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😮')">😮</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😢')">😢</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😡')">😡</button>
            </div>
            
            ${reactionsHtml}
            
            ${isExpanded ? `
              <div class="comments-section">
                <div class="comment-form">
                  <input type="text" id="comment-input-${confession.id}" class="comment-input" placeholder="Write an anonymous comment...">
                  <button class="comment-btn" onclick="addComment(${confession.id})">Post</button>
                </div>
                <div class="comments-list">
                  ${confession.comments.length === 0 ? '<div style="color:rgba(255,255,255,0.3);font-size:0.7rem;padding:8px;">No comments yet. Be the first to comment 💬</div>' : ''}
                  ${confession.comments.map(comment => {
                    const userOwnsComment = comment.userId === currentUserId;
                    const showCommentDelete = canDeleteComment(comment);
                    return `
                      <div class="comment-item">
                        <div style="display:flex;align-items:center;gap:6px;flex:1;">
                          <span class="comment-anonymous">🕊️ Anonymous ${userOwnsComment ? '(You)' : ''}</span>
                          <span class="comment-text">${escapeHtml(comment.text)}</span>
                        </div>
                        ${showCommentDelete ? `<button class="comment-delete" onclick="deleteComment(${confession.id}, ${comment.id})">🗑️</button>` : ''}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
      return `${Math.floor(diff / 86400)} days ago`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // GIF Functions
    let currentGifCallback = null;

    function openGifPicker(callback) {
      currentGifCallback = callback;
      document.getElementById('gifModal').classList.add('active');
      document.getElementById('gifSearch').value = '';
      searchGifs('');
    }

    function closeGifPicker() {
      document.getElementById('gifModal').classList.remove('active');
    }

    async function searchGifs(query) {
      const url = query ? `https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(query)}&key=AIzaSyC9VJpZ8qk8q8q8q8q8q8q8q8q8q8q8&limit=12` : `https://tenor.googleapis.com/v2/trending?key=AIzaSyC9VJpZ8qk8q8q8q8q8q8q8q8q8q8q8&limit=12`;
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        const results = document.getElementById('gifResults');
        if (data.results && data.results.length > 0) {
          results.innerHTML = data.results.map(gif => `
            <div style="cursor: pointer; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.05);" onclick="selectGif('${gif.media_formats.gif.url}')">
              <img src="${gif.media_formats.tinygif.url}" style="width: 100%; height: auto;">
            </div>
          `).join('');
        } else {
          results.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">No GIFs found</p>';
        }
      } catch(e) {
        document.getElementById('gifResults').innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">Failed to load GIFs</p>';
      }
    }

    function selectGif(gifUrl) {
      if (currentGifCallback) {
        currentGifCallback(gifUrl);
      }
      closeGifPicker();
    }

    function addGifToInput(gifUrl) {
      const input = document.getElementById('confessionInput');
      const currentText = input.value;
      input.value = currentText + (currentText ? '\n' : '') + `[GIF: ${gifUrl}]`;
      showToast('🎬 GIF added!');
    }

    let searchTimeout;
    document.getElementById('gifSearch')?.addEventListener('input', function(e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchGifs(e.target.value), 300);
    });

    document.getElementById('confessionInput').addEventListener('input', function() {
      const count = this.value.length;
      document.getElementById('charCount').innerText = `${count}/500`;
      if (count > 500) {
        this.value = this.value.slice(0, 500);
        document.getElementById('charCount').innerText = "500/500";
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderConfessions();
      });
    });

    loadConfessions();


  function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const themeToggle = document.getElementById('themeToggle');
    
    if (currentTheme === 'dark') {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      if (themeToggle) themeToggle.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      if (themeToggle) themeToggle.textContent = '☀️';
    }
  }
  
  const savedTheme = localStorage.getItem('theme');
  const themeToggle = document.getElementById('themeToggle');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (themeToggle) themeToggle.textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (themeToggle) themeToggle.textContent = '🌙';
  }

    
    // Page transition effect
    document.body.classList.add('fade-in');
    
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (navbar) {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }
    });
  </script>

</body>
