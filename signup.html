<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 100%);
    }
    .auth-box {
      background: #0f3460;
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,107,157,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff6b9d;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      text-align: center;
      color: #a0a0b0;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
      color: #eaeaea;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 13px 16px;
      background: #1a1a2e;
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 12px;
      color: #eaeaea;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: #ff6b9d; }
    .form-group select option { background: #1a1a2e; }
    .gender-row { display: flex; gap: 10px; }
    .gender-btn {
      flex: 1;
      padding: 12px;
      background: #1a1a2e;
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 12px;
      color: #a0a0b0;
      font-size: 0.85rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .gender-btn.active {
      border-color: #ff6b9d;
      color: #ff6b9d;
      background: rgba(255,107,157,0.1);
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230,57,70,0.4);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #a0a0b0;
    }
    .auth-switch a {
      color: #ff6b9d;
      text-decoration: none;
      font-weight: 600;
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid rgba(255,107,157,0.3);
      transition: all 0.3s;
    }
    .step-dot.active {
      background: #ff6b9d;
      border-color: #ff6b9d;
    }
    .form-step { display: none; }
    .form-step.active { display: block; }
    .step-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }
    .step-desc {
      font-size: 0.8rem;
      color: #a0a0b0;
      text-align: center;
      margin-bottom: 22px;
    }
    .back-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,107,157,0.3);
      border-radius: 12px;
      color: #ff6b9d;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,107,157,0.1); }
    .interest-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .interest-btn {
      padding: 10px;
      background: #1a1a2e;
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 10px;
      color: #a0a0b0;
      font-size: 0.8rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .interest-btn.active {
      border-color: #ff6b9d;
      color: #ff6b9d;
      background: rgba(255,107,157,0.1);
    }
    .error-msg {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      color: #e63946;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4caf50;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">💕 EntranceHearts</a>
    <div class="nav-buttons">
      <a href="login.html" class="btn-outline">Login</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💕 EntranceHearts</div>
      <div class="auth-subtitle">Join Nepal's aspirant community</div>

      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- STEP 1 -->
      <div class="form-step active" id="step1">
        <div class="step-title">Create Account</div>
        <div class="step-desc">Step 1 of 3 — Basic info</div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="age" placeholder="Your age" min="15" max="30"/>
        </div>
        <button class="submit-btn" onclick="goStep(2)">Continue →</button>
      </div>

      <!-- STEP 2 -->
      <div class="form-step" id="step2">
        <div class="step-title">Your Study Info</div>
        <div class="step-desc">Step 2 of 3 — Academic details</div>
        <div class="form-group">
          <label>I am a</label>
          <select id="category">
            <option value="">Select your category</option>
            <option value="cee">CEE Aspirant</option>
            <option value="ioe">IOE Aspirant</option>
            <option value="plus2">+2 Student</option>
            <option value="management">Management Student</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="location" placeholder="Your city/district"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <div class="gender-row">
            <button class="gender-btn" onclick="selectGender(this, 'male')">👨 Male</button>
            <button class="gender-btn" onclick="selectGender(this, 'female')">👩 Female</button>
            <button class="gender-btn" onclick="selectGender(this, 'other')">🧑 Other</button>
          </div>
        </div>
        <div class="form-group">
          <label>Looking for</label>
          <select id="lookingFor">
            <option value="">Select preference</option>
            <option value="friendship">Study Partner / Friendship</option>
            <option value="relationship">Relationship</option>
            <option value="both">Both</option>
          </select>
        </div>
        <button class="submit-btn" onclick="goStep(3)">Continue →</button>
        <button class="back-btn" onclick="goStep(1)">← Back</button>
      </div>

      <!-- STEP 3 -->
      <div class="form-step" id="step3">
        <div class="step-title">Your Interests</div>
        <div class="step-desc">Step 3 of 3 — Pick at least 3</div>
        <div class="interest-grid">
          <button class="interest-btn" onclick="toggleInterest(this)">📚 Studying</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🎵 Music</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🎮 Gaming</button>
          <button class="interest-btn" onclick="toggleInterest(this)">📷 Photography</button>
          <button class="interest-btn" onclick="toggleInterest(this)">⚽ Sports</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🎨 Art</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🍕 Foodie</button>
          <button class="interest-btn" onclick="toggleInterest(this)">✈️ Travel</button>
          <button class="interest-btn" onclick="toggleInterest(this)">📖 Reading</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🎬 Movies</button>
          <button class="interest-btn" onclick="toggleInterest(this)">💻 Coding</button>
          <button class="interest-btn" onclick="toggleInterest(this)">🧘 Fitness</button>
        </div>
        <button class="submit-btn" onclick="submitSignup()" id="submitBtn" style="margin-top:18px">
          Create My Profile 💕
        </button>
        <button class="back-btn" onclick="goStep(2)">← Back</button>
      </div>

    </div>
    <div class="auth-switch">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    let selectedGender = '';
    let selectedInterests = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
    }

    function goStep(n) {
      if (n === 2) {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const age = document.getElementById('age').value;
        if (!name || !email || !password || !age) {
          showError('Please fill all fields!');
          return;
        }
        if (password.length < 6) {
          showError('Password must be at least 6 characters!');
          return;
        }
      }
      if (n === 3) {
        const category = document.getElementById('category').value;
        const location = document.getElementById('location').value;
        if (!category || !location || !selectedGender) {
          showError('Please fill all fields and select gender!');
          return;
        }
      }
      document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      document.getElementById('dot' + n).classList.add('active');
    }

    function selectGender(btn, val) {
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedGender = val;
    }

    function toggleInterest(btn) {
      btn.classList.toggle('active');
      const text = btn.textContent.trim();
      if (btn.classList.contains('active')) {
        selectedInterests.push(text);
      } else {
        selectedInterests = selectedInterests.filter(i => i !== text);
      }
    } 

    async function submitSignup() {
      if (selectedInterests.length < 3) {
        showError('Please select at least 3 interests!');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const age = document.getElementById('age').value;
      const category = document.getElementById('category').value;
      const location = document.getElementById('location').value;
      const lookingFor = document.getElementById('lookingFor').value;

      try {
        // Create auth account
        const { data, error } = await supabaseClient.auth.signUp({
  email, password,
  options: {
    emailRedirectTo: null,
    data: { name }
  }
});

        if (error) throw error;

        // Save profile to database
        const { error: profileError } = await supabaseClient
          .from('profiles')
          .insert({
            id: data.user.id,
            name, age: parseInt(age),
            gender: selectedGender,
            category, location,
            looking_for: lookingFor,
            interests: selectedInterests
          });

        if (profileError) throw profileError;

        showSuccess('Account created! Redirecting...');
        localStorage.setItem('ehLoggedIn', 'true');
        localStorage.setItem('ehUserId', data.user.id);
        setTimeout(() => window.location.href = 'browse.html', 1500);

      } catch (err) {
        showError(err.message || 'Something went wrong. Try again!');
        btn.disabled = false;
        btn.textContent = 'Create My Profile 💕';
      }
    }
  </script>

</body>
</html>
