<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Study Timer ⏱️ - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ========================================
       STUDY TIMER - PREMIUM DARK THEME
       Pink Gradient | Productivity Tracker
       ======================================== */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 20, 147, 0.2);
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar.scrolled {
      padding: 12px 32px;
      background: rgba(10, 10, 15, 0.95);
    }
    .back-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      color: #FF6B9D;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 90px 20px 100px;
    }
    
    .timer-card {
      background: linear-gradient(135deg, rgba(255,20,147,0.08), rgba(255,107,157,0.04));
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
    }
    .timer-display {
      font-size: 4rem;
      font-weight: 800;
      font-family: monospace;
      letter-spacing: 5px;
      margin: 20px 0;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .timer-controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .timer-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      padding: 12px 24px;
      border-radius: 100px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .timer-btn:hover {
      background: #FF1493;
      transform: scale(1.02);
    }
    
    .goal-section {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .progress-bar {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      width: 0%;
      height: 100%;
      transition: width 0.3s;
    }
    .goal-input {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .goal-input input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 14px;
      padding: 10px;
      color: white;
    }
    .goal-input button {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      padding: 10px 20px;
      border-radius: 100px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .goal-input button:hover {
      transform: translateY(-2px);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      transition: all 0.2s;
    }
    .stat-card:hover {
      border-color: rgba(255,20,147,0.4);
      transform: translateY(-2px);
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .pomodoro-card {
      cursor: pointer;
      margin-bottom: 20px;
    }
    .pomodoro-card:hover {
      transform: translateY(-2px);
    }
    
    .leaderboard-card {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 24px;
      padding: 20px;
    }
    .leaderboard-title {
      font-size: 1rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,20,147,0.1);
    }
    .rank {
      width: 35px;
      font-weight: 700;
    }
    .rank-1 { color: #FFD700; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }
    .user-name {
      flex: 1;
    }
    .user-hours {
      color: #FF6B9D;
      font-weight: 600;
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      z-index: 200;
      display: none;
    }
    .toast.show {
      display: block;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      border-radius: 32px;
      padding: 32px;
      text-align: center;
      max-width: 350px;
      width: 90%;
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">⏱️ Study Timer</div>
    <div style="width: 50px;"></div>
  </nav>

  <div class="container">
    <div class="timer-card">
      <div style="font-size: 2rem;">📚</div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="startBtn">▶ Start</button>
        <button class="timer-btn" id="pauseBtn">⏸ Pause</button>
        <button class="timer-btn" id="resetBtn">🔄 Reset</button>
      </div>
      <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4);">
        Current Session: <span id="currentSession">0</span> minutes
      </div>
    </div>

    <div class="goal-section">
      <div class="goal-header">
        <span>🎯 Daily Goal</span>
        <span id="goalStatus">0 / 0 hours</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="goalProgress"></div>
      </div>
      <div class="goal-input">
        <input type="number" id="goalInput" placeholder="Hours per day" min="1" max="12">
        <button onclick="setDailyGoal()">Set Goal</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="todayHours">0</div>
        <div class="stat-label">Today's Study</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="weekHours">0</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalHours">0</div>
        <div class="stat-label">Total Hours</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streakDays">0</div>
        <div class="stat-label">🔥 Day Streak</div>
      </div>
    </div>

    <div class="stat-card pomodoro-card" onclick="openPomodoroModal()">
      <div class="stat-value" id="pomodoroCount">0</div>
      <div class="stat-label">🍅 Pomodoros Completed</div>
    </div>

    <div class="leaderboard-card">
      <div class="leaderboard-title">
        <span>🏆 Weekly Leaderboard</span>
      </div>
      <div id="leaderboardList">
        <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);">
          Study to see yourself on leaderboard!
        </div>
      </div>
    </div>
  </div>

  <!-- Pomodoro Modal -->
  <div id="pomodoroModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 4rem; margin-bottom: 16px;">🍅</div>
      <h3 style="margin-bottom: 8px;">Pomodoro Timer</h3>
      <p style="color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 20px;">25 min focus • 5 min break</p>
      <div id="pomodoroDisplay" style="font-size: 3rem; font-weight: 800; font-family: monospace; margin-bottom: 20px; background: linear-gradient(135deg, #FF1493, #FF6B9D); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">25:00</div>
      <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;">
        <button class="timer-btn" id="pomodoroStartBtn">▶ Start</button>
        <button class="timer-btn" id="pomodoroPauseBtn">⏸ Pause</button>
        <button class="timer-btn" id="pomodoroResetBtn">🔄 Reset</button>
      </div>
      <button id="closePomodoroBtn" style="width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,20,147,0.3); border-radius: 100px; color: white; cursor: pointer;">Close</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ========== STUDY TIMER ==========
    let timerInterval = null;
    let seconds = 0;
    let isRunning = false;

    let studyData = {
      dailyGoal: 4,
      todaySeconds: 0,
      history: {}
    };

    function loadData() {
      const saved = localStorage.getItem('entrancehearts_study_data');
      if (saved) {
        studyData = JSON.parse(saved);
      } else {
        studyData.history = {};
        saveData();
      }
      updateDisplay();
    }

    function saveData() {
      localStorage.setItem('entrancehearts_study_data', JSON.stringify(studyData));
    }

    function getTodayString() {
      return new Date().toISOString().split('T')[0];
    }

    function addTodaySeconds(addedSeconds) {
      const today = getTodayString();
      if (!studyData.history[today]) {
        studyData.history[today] = 0;
      }
      studyData.history[today] += addedSeconds;
      studyData.todaySeconds = studyData.history[today];
      saveData();
      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);
      
      if (seconds > 0) {
        const minutesAdded = Math.floor(seconds / 60);
        addTodaySeconds(seconds);
        showToast(`📚 +${minutesAdded} minute${minutesAdded !== 1 ? 's' : ''} added to your study time!`);
        seconds = 0;
        updateTimerDisplay();
      }
    }

    function resetTimer() {
      if (isRunning) {
        pauseTimer();
      } else {
        seconds = 0;
        updateTimerDisplay();
        showToast('Timer reset');
      }
    }

    function updateTimerDisplay() {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      document.getElementById('timerDisplay').innerText = 
        `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      document.getElementById('currentSession').innerText = Math.floor(seconds / 60);
    }

    function updateDisplay() {
      const today = getTodayString();
      const todaySecs = studyData.history[today] || 0;
      const todayHours = (todaySecs / 3600).toFixed(1);
      
      let weekSecs = 0;
      let totalSecs = 0;
      let streak = 0;
      
      for (let i = 0; i < 30; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const secs = studyData.history[dateStr] || 0;
        totalSecs += secs;
        
        if (i < 7) weekSecs += secs;
        
        if (i === 0 && secs > 0) streak = 1;
        else if (i > 0 && secs > 0 && streak === i) streak++;
        else if (secs === 0 && i > 0) break;
      }
      
      document.getElementById('todayHours').innerText = todayHours;
      document.getElementById('weekHours').innerText = (weekSecs / 3600).toFixed(1);
      document.getElementById('totalHours').innerText = (totalSecs / 3600).toFixed(1);
      document.getElementById('streakDays').innerText = streak;
      
      const goalHours = studyData.dailyGoal;
      const goalProgress = Math.min(100, (todaySecs / (goalHours * 3600)) * 100);
      document.getElementById('goalProgress').style.width = `${goalProgress}%`;
      document.getElementById('goalStatus').innerText = `${todayHours} / ${goalHours} hours`;
      
      updateLeaderboard();
    }
    
    function setDailyGoal() {
      const input = document.getElementById('goalInput');
      const hours = parseInt(input.value);
      if (hours >= 1 && hours <= 12) {
        studyData.dailyGoal = hours;
        saveData();
        updateDisplay();
        showToast(`🎯 Daily goal set to ${hours} hours!`);
        input.value = '';
      } else {
        showToast('Please enter 1-12 hours');
      }
    }
    
    function updateLeaderboard() {
      let allUsers = [];
      const currentUserHours = getWeekHours();
      allUsers.push({ name: "You", hours: currentUserHours, isCurrent: true });
      
      const sampleUsers = [
        { name: "📚 Ram (CEE)", hours: 28 },
        { name: "⚙️ Shreya (IOE)", hours: 24 },
        { name: "📖 Aayush (+2)", hours: 19 },
        { name: "💼 Priya (MGMT)", hours: 15 },
        { name: "🏥 Sita (CEE)", hours: 12 }
      ];
      
      allUsers = [...allUsers, ...sampleUsers];
      allUsers.sort((a, b) => b.hours - a.hours);
      
      const leaderboardHTML = allUsers.slice(0, 10).map((user, index) => `
        <div class="leaderboard-item">
          <div class="rank ${index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : ''}">
            ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index+1}`}
          </div>
          <div class="user-name">${user.name} ${user.isCurrent ? '(You)' : ''}</div>
          <div class="user-hours">${user.hours} hrs</div>
        </div>
      `).join('');
      
      document.getElementById('leaderboardList').innerHTML = leaderboardHTML;
    }
    
    function getWeekHours() {
      let weekSecs = 0;
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        weekSecs += studyData.history[dateStr] || 0;
      }
      return (weekSecs / 3600).toFixed(1);
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ========== POMODORO TIMER ==========
    let pomodoroInterval = null;
    let pomodoroSeconds = 25 * 60;
    let isPomodoroRunning = false;
    let pomodoroCount = parseInt(localStorage.getItem('ehPomodoroCount') || '0');

    document.getElementById('pomodoroCount').innerText = pomodoroCount;

    function openPomodoroModal() {
      document.getElementById('pomodoroModal').classList.add('active');
      updatePomodoroDisplay();
    }

    function closePomodoroModal() {
      document.getElementById('pomodoroModal').classList.remove('active');
      if (pomodoroInterval) {
        clearInterval(pomodoroInterval);
        isPomodoroRunning = false;
      }
    }

    function updatePomodoroDisplay() {
      const mins = Math.floor(pomodoroSeconds / 60);
      const secs = pomodoroSeconds % 60;
      const display = document.getElementById('pomodoroDisplay');
      if (display) {
        display.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      }
    }

    function startPomodoro() {
      if (isPomodoroRunning) return;
      isPomodoroRunning = true;
      pomodoroInterval = setInterval(() => {
        if (pomodoroSeconds <= 0) {
          pomodoroCount++;
          localStorage.setItem('ehPomodoroCount', pomodoroCount);
          document.getElementById('pomodoroCount').innerText = pomodoroCount;
          
          // Confetti effect
          for (let i = 0; i < 30; i++) {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = Math.random() * 8 + 4 + 'px';
            confetti.style.background = ['#FF1493', '#FF6B9D', '#FF8FB3'][Math.floor(Math.random() * 3)];
            confetti.style.borderRadius = '2px';
            confetti.style.zIndex = '9999';
            confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s linear forwards`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
          }
          
          showToast('🍅 Pomodoro completed! Time for a 5 min break!');
          resetPomodoro();
        } else {
          pomodoroSeconds--;
          updatePomodoroDisplay();
        }
      }, 1000);
    }

    function pausePomodoro() {
      if (!isPomodoroRunning) return;
      isPomodoroRunning = false;
      clearInterval(pomodoroInterval);
    }

    function resetPomodoro() {
      pausePomodoro();
      pomodoroSeconds = 25 * 60;
      updatePomodoroDisplay();
    }

    // Add confetti animation style
    if (!document.querySelector('#confetti-style')) {
      const style = document.createElement('style');
      style.id = 'confetti-style';
      style.textContent = `
        @keyframes confettiFall {
          0% { transform: translateY(0) rotate(0deg); opacity: 1; }
          100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    // Event listeners
    document.getElementById('startBtn').addEventListener('click', startTimer);
    document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);
    
        document.getElementById('pomodoroStartBtn').addEventListener('click', startPomodoro);
    document.getElementById('pomodoroPauseBtn').addEventListener('click', pausePomodoro);
    document.getElementById('pomodoroResetBtn').addEventListener('click', resetPomodoro);
    document.getElementById('closePomodoroBtn').addEventListener('click', closePomodoroModal);

    window.addEventListener('beforeunload', () => {
      if (isRunning) {
        pauseTimer();
      }
    });
    
    loadData();
    
    setInterval(() => {
      if (!isRunning) {
        updateDisplay();
      }
    }, 60000);

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else if (navbar) {
        navbar.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
