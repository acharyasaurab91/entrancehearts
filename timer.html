<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Timer ⏱️ - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">⏱️ Study Timer</div>
    <div style="width: 50px;"></div>
    <div style="display: flex; gap: 10px; align-items: center;">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="container">
    <div class="timer-card">
      <div style="font-size: 2rem;">📚</div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="startBtn">▶ Start</button>
        <button class="timer-btn" id="pauseBtn">⏸ Pause</button>
        <button class="timer-btn" id="resetBtn">🔄 Reset</button>
      </div>
      <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4);">
        Current Session: <span id="currentSession">0</span> minutes
      </div>
    </div>

    <div class="goal-section">
      <div class="goal-header">
        <span>🎯 Daily Goal</span>
        <span id="goalStatus">0 / 0 hours</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="goalProgress"></div>
      </div>
      <div class="goal-input">
        <input type="number" id="goalInput" placeholder="Hours per day" min="1" max="12">
        <button onclick="setDailyGoal()">Set Goal</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="todayHours">0</div>
        <div class="stat-label">Today's Study</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="weekHours">0</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalHours">0</div>
        <div class="stat-label">Total Hours</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streakDays">0</div>
        <div class="stat-label">🔥 Day Streak</div>
      </div>
    </div>

    <div class="stat-card pomodoro-card" onclick="openPomodoroModal()">
      <div class="stat-value" id="pomodoroCount">0</div>
      <div class="stat-label">🍅 Pomodoros Completed</div>
    </div>

    <div class="leaderboard-card">
      <div class="leaderboard-title">
        <span>🏆 Weekly Leaderboard</span>
      </div>
      <div id="leaderboardList">
        <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);">
          Study to see yourself on leaderboard!
        </div>
      </div>
    </div>
  </div>

  <!-- Pomodoro Modal -->
  <div id="pomodoroModal" class="modal-overlay">
    <div class="modal-content">
      <div style="font-size: 4rem; margin-bottom: 16px;">🍅</div>
      <h3 style="margin-bottom: 8px;">Pomodoro Timer</h3>
      <p style="color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 20px;">25 min focus • 5 min break</p>
      <div id="pomodoroDisplay" style="font-size: 3rem; font-weight: 800; font-family: monospace; margin-bottom: 20px; background: linear-gradient(135deg, #ff6b9d, #e63946); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">25:00</div>
      <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;">
        <button class="timer-btn" id="pomodoroStartBtn">▶ Start</button>
        <button class="timer-btn" id="pomodoroPauseBtn">⏸ Pause</button>
        <button class="timer-btn" id="pomodoroResetBtn">🔄 Reset</button>
      </div>
      <button id="closePomodoroBtn" style="width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; color: white; cursor: pointer;">Close</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ========== STUDY TIMER ==========
    let timerInterval = null;
    let seconds = 0;
    let isRunning = false;

    let studyData = {
      dailyGoal: 4,
      todaySeconds: 0,
      history: {}
    };

    function loadData() {
      const saved = localStorage.getItem('entrancehearts_study_data');
      if (saved) {
        studyData = JSON.parse(saved);
      } else {
        studyData.history = {};
        saveData();
      }
      updateDisplay();
    }

    function saveData() {
      localStorage.setItem('entrancehearts_study_data', JSON.stringify(studyData));
    }

    function getTodayString() {
      return new Date().toISOString().split('T')[0];
    }

    function addTodaySeconds(addedSeconds) {
      const today = getTodayString();
      if (!studyData.history[today]) {
        studyData.history[today] = 0;
      }
      studyData.history[today] += addedSeconds;
      studyData.todaySeconds = studyData.history[today];
      saveData();
      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);
      
      if (seconds > 0) {
        const minutesAdded = Math.floor(seconds / 60);
        addTodaySeconds(seconds);
        showToast(`📚 +${minutesAdded} minute${minutesAdded !== 1 ? 's' : ''} added to your study time!`);
        seconds = 0;
        updateTimerDisplay();
      }
    }

    function resetTimer() {
      if (isRunning) {
        pauseTimer();
      } else {
        seconds = 0;
        updateTimerDisplay();
        showToast('Timer reset');
      }
    }

    function updateTimerDisplay() {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      document.getElementById('timerDisplay').innerText = 
        `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      document.getElementById('currentSession').innerText = Math.floor(seconds / 60);
    }

    function updateDisplay() {
      const today = getTodayString();
      const todaySecs = studyData.history[today] || 0;
      const todayHours = (todaySecs / 3600).toFixed(1);
      
      let weekSecs = 0;
      let totalSecs = 0;
      let streak = 0;
      
      for (let i = 0; i < 30; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const secs = studyData.history[dateStr] || 0;
        totalSecs += secs;
        
        if (i < 7) weekSecs += secs;
        
        if (i === 0 && secs > 0) streak = 1;
        else if (i > 0 && secs > 0 && streak === i) streak++;
        else if (secs === 0 && i > 0) break;
      }
      
      document.getElementById('todayHours').innerText = todayHours;
      document.getElementById('weekHours').innerText = (weekSecs / 3600).toFixed(1);
      document.getElementById('totalHours').innerText = (totalSecs / 3600).toFixed(1);
      document.getElementById('streakDays').innerText = streak;
      
      const goalHours = studyData.dailyGoal;
      const goalProgress = Math.min(100, (todaySecs / (goalHours * 3600)) * 100);
      document.getElementById('goalProgress').style.width = `${goalProgress}%`;
      document.getElementById('goalStatus').innerText = `${todayHours} / ${goalHours} hours`;
      
      updateLeaderboard();
    }
    
    function setDailyGoal() {
      const input = document.getElementById('goalInput');
      const hours = parseInt(input.value);
      if (hours >= 1 && hours <= 12) {
        studyData.dailyGoal = hours;
        saveData();
        updateDisplay();
        showToast(`🎯 Daily goal set to ${hours} hours!`);
        input.value = '';
      } else {
        showToast('Please enter 1-12 hours');
      }
    }
    
    function updateLeaderboard() {
      let allUsers = [];
      const currentUserHours = getWeekHours();
      allUsers.push({ name: "You", hours: currentUserHours, isCurrent: true });
      
      const sampleUsers = [
        { name: "📚 Ram (CEE)", hours: 28 },
        { name: "⚙️ Shreya (IOE)", hours: 24 },
        { name: "📖 Aayush (+2)", hours: 19 },
        { name: "💼 Priya (MGMT)", hours: 15 },
        { name: "🏥 Sita (CEE)", hours: 12 }
      ];
      
      allUsers = [...allUsers, ...sampleUsers];
      allUsers.sort((a, b) => b.hours - a.hours);
      
      const leaderboardHTML = allUsers.slice(0, 10).map((user, index) => `
        <div class="leaderboard-item">
          <div class="rank ${index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : ''}">
            ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index+1}`}
          </div>
          <div class="user-name">${user.name} ${user.isCurrent ? '(You)' : ''}</div>
          <div class="user-hours">${user.hours} hrs</div>
        </div>
      `).join('');
      
      document.getElementById('leaderboardList').innerHTML = leaderboardHTML;
    }
    
    function getWeekHours() {
      let weekSecs = 0;
      for (let i = 0; i < 7; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        weekSecs += studyData.history[dateStr] || 0;
      }
      return (weekSecs / 3600).toFixed(1);
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ========== POMODORO TIMER ==========
    let pomodoroInterval = null;
    let pomodoroSeconds = 25 * 60;
    let isPomodoroRunning = false;
    let pomodoroCount = parseInt(localStorage.getItem('ehPomodoroCount') || '0');

    document.getElementById('pomodoroCount').innerText = pomodoroCount;

    function openPomodoroModal() {
      document.getElementById('pomodoroModal').classList.add('active');
      updatePomodoroDisplay();
    }

    function closePomodoroModal() {
      document.getElementById('pomodoroModal').classList.remove('active');
      if (pomodoroInterval) {
        clearInterval(pomodoroInterval);
        isPomodoroRunning = false;
      }
    }

    function updatePomodoroDisplay() {
      const mins = Math.floor(pomodoroSeconds / 60);
      const secs = pomodoroSeconds % 60;
      const display = document.getElementById('pomodoroDisplay');
      if (display) {
        display.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      }
    }

    function startPomodoro() {
      if (isPomodoroRunning) return;
      isPomodoroRunning = true;
      pomodoroInterval = setInterval(() => {
        if (pomodoroSeconds <= 0) {
          pomodoroCount++;
          localStorage.setItem('ehPomodoroCount', pomodoroCount);
          document.getElementById('pomodoroCount').innerText = pomodoroCount;
          
          // Confetti effect
          for (let i = 0; i < 30; i++) {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.width = Math.random() * 8 + 4 + 'px';
            confetti.style.height = Math.random() * 8 + 4 + 'px';
            confetti.style.background = ['#ff6b9d', '#e63946', '#ff8fb3'][Math.floor(Math.random() * 3)];
            confetti.style.borderRadius = '2px';
            confetti.style.zIndex = '9999';
            confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s linear forwards`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
          }
          
          showToast('🍅 Pomodoro completed! Time for a 5 min break!');
          resetPomodoro();
        } else {
          pomodoroSeconds--;
          updatePomodoroDisplay();
        }
      }, 1000);
    }

    function pausePomodoro() {
      if (!isPomodoroRunning) return;
      isPomodoroRunning = false;
      clearInterval(pomodoroInterval);
    }

    function resetPomodoro() {
      pausePomodoro();
      pomodoroSeconds = 25 * 60;
      updatePomodoroDisplay();
    }

    // Add confetti animation style
    if (!document.querySelector('#confetti-style')) {
      const style = document.createElement('style');
      style.id = 'confetti-style';
      style.textContent = `
        @keyframes confettiFall {
          0% { transform: translateY(0) rotate(0deg); opacity: 1; }
          100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    // Event listeners
    document.getElementById('startBtn').addEventListener('click', startTimer);
    document.getElementById('pauseBtn').addEventListener('click', pauseTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);
    
    document.getElementById('pomodoroStartBtn').addEventListener('click', startPomodoro);
    document.getElementById('pomodoroPauseBtn').addEventListener('click', pausePomodoro);
    document.getElementById('pomodoroResetBtn').addEventListener('click', resetPomodoro);
    document.getElementById('closePomodoroBtn').addEventListener('click', closePomodoroModal);

    window.addEventListener('beforeunload', () => {
      if (isRunning) {
        pauseTimer();
      }
    });
    
    loadData();
    
    setInterval(() => {
      if (!isRunning) {
        updateDisplay();
           }
    }, 60000);


    
  function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const themeToggle = document.getElementById('themeToggle');
    
    if (currentTheme === 'dark') {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      if (themeToggle) themeToggle.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      if (themeToggle) themeToggle.textContent = '☀️';
    }
  }
  
  const savedTheme = localStorage.getItem('theme');
  const themeToggle = document.getElementById('themeToggle');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (themeToggle) themeToggle.textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (themeToggle) themeToggle.textContent = '🌙';
  }
  
  
    // Page transition effect
  
    document.body.classList.add('fade-in');
    
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (navbar) {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }
    });
    
  </script>

</body>
</html>
