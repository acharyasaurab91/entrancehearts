<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Segment 📚 - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0f;
      color: white;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(20px);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b9d, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 20px 100px;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #ff6b9d, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .hero p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 24px;
      border-radius: 50px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-btn.active {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border-color: transparent;
      color: white;
    }

    .cat-btn:hover {
      transform: translateY(-2px);
    }

    /* Upload Section */
    .upload-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 30px;
    }

    .upload-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-row input, .form-row select {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
    }

    .form-row input:focus, .form-row select:focus {
      outline: none;
      border-color: #ff6b9d;
    }

    .file-input-wrapper {
      background: rgba(255, 255, 255, 0.08);
      border: 1px dashed rgba(255, 107, 157, 0.5);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-input-wrapper:hover {
      background: rgba(255, 107, 157, 0.1);
      border-color: #ff6b9d;
    }

    .file-input-wrapper input {
      display: none;
    }

    .file-label {
      cursor: pointer;
      color: #ff6b9d;
    }

    .selected-file {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
    }

    .upload-btn {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
    }

    /* Materials Grid */
    .materials-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .materials-header h3 {
      font-size: 1.1rem;
    }

    .search-box {
      display: flex;
      gap: 8px;
    }

    .search-box input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      padding: 8px 16px;
      color: white;
      font-size: 0.8rem;
      width: 200px;
    }

    .materials-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .material-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 18px;
      transition: all 0.2s;
    }

    .material-card:hover {
      border-color: rgba(255, 107, 157, 0.3);
      background: rgba(255, 107, 157, 0.03);
    }

    .material-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .material-title {
      font-size: 1rem;
      font-weight: 700;
      color: #ff6b9d;
    }

    .material-badge {
      background: rgba(255, 107, 157, 0.15);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 0.7rem;
      color: #ff6b9d;
    }

    .material-description {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .material-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .download-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 50px;
      color: white;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .download-btn:hover {
      background: #ff6b9d;
      border-color: #ff6b9d;
    }

    .delete-material {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px 8px;
    }

    .delete-material:hover {
      color: #e63946;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.4);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid #ff6b9d;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      z-index: 200;
      display: none;
    }

    .toast.show {
      display: block;
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* Admin Badge */
    .admin-badge {
      background: rgba(230, 57, 70, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #ff6b9d;
    }

    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
      }
      .materials-header {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">📚 Study Segment</div>
    <div>
      <span id="adminIndicator" class="admin-badge" style="display: none;">👑 Admin</span>
      <button onclick="toggleAdminMode()" style="background:none;border:none;color:#ff6b9d;cursor:pointer;font-size:0.7rem;">Admin</button>
    </div>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>📖 Study Material Library</h1>
      <p>Share and download notes, past questions, and study resources for CEE, IOE, +2 & Management</p>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <button class="cat-btn active" data-cat="all">📚 All</button>
      <button class="cat-btn" data-cat="CEE">🏥 CEE (MBBS)</button>
      <button class="cat-btn" data-cat="IOE">⚙️ IOE (Engineering)</button>
      <button class="cat-btn" data-cat="+2">📖 +2 (Science)</button>
      <button class="cat-btn" data-cat="Management">💼 Management</button>
    </div>

    <!-- Upload Section -->
    <div class="upload-section">
      <div class="upload-title">
        <span>📤</span> Share Your Study Material
      </div>
      <div class="upload-form">
        <div class="form-row">
          <input type="text" id="materialTitle" placeholder="Title (e.g., Physics Notes - Unit 1)">
          <select id="materialCategory">
            <option value="CEE">CEE (MBBS)</option>
            <option value="IOE">IOE (Engineering)</option>
            <option value="+2">+2 (Science)</option>
            <option value="Management">Management</option>
          </select>
        </div>
        <div class="form-row">
          <textarea id="materialDesc" placeholder="Description (what's included, which chapter, etc.)" style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;color:white;font-family:'Poppins',sans-serif;resize:vertical;min-height:70px;"></textarea>
        </div>
        <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt"></i> Click to upload PDF/File
          <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt">
        </div>
        <div id="selectedFileName" class="selected-file">No file selected</div>
        <button class="upload-btn" onclick="uploadMaterial()">📤 Share Material</button>
      </div>
    </div>

    <!-- Materials List -->
    <div class="materials-header">
      <h3>📚 Study Materials</h3>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search materials..." onkeyup="renderMaterials()">
      </div>
    </div>

    <div id="materialsGrid" class="materials-grid"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let materials = [];
    let currentCategory = "all";
    let isAdmin = false;
    const ADMIN_CODE = "entrancehearts2024";

    // Load materials from localStorage
    function loadMaterials() {
      const saved = localStorage.getItem('entrancehearts_materials');
      if (saved) {
        materials = JSON.parse(saved);
      } else {
        // Sample materials
        materials = [
          {
            id: 1,
            title: "CEE Previous Year Questions (2078-2080)",
            category: "CEE",
            description: "Complete collection of past year questions with answer keys. Includes Physics, Chemistry, Biology, and IQ.",
            fileName: "CEE_PYQ_2078_2080.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 245
          },
          {
            id: 2,
            title: "IOE Entrance Preparation Guide",
            category: "IOE",
            description: "Complete guide for IOE entrance exam. Includes tips, tricks, and important formulas for Mathematics, Physics, Chemistry.",
            fileName: "IOE_Preparation_Guide.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 189
          },
          {
            id: 3,
            title: "+2 Physics Handwritten Notes (Mechanics)",
            category: "+2",
            description: "Complete handwritten notes covering Kinematics, Laws of Motion, Work Power Energy.",
            fileName: "Physics_Mechanics_Notes.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 312
          },
          {
            id: 4,
            title: "Management - Accountancy Formulas",
            category: "Management",
            description: "All important accountancy formulas for +2 Management students. Ratio analysis, journal entries, and more.",
            fileName: "Accountancy_Formulas.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 156
          },
          {
            id: 5,
            title: "CEE Biology Important Diagrams",
            category: "CEE",
            description: "Must-know diagrams for CEE entrance exam. Labeled diagrams with explanations.",
            fileName: "Biology_Diagrams_CEE.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 178
          }
        ];
        saveMaterials();
      }
      renderMaterials();
    }

    function saveMaterials() {
      localStorage.setItem('entrancehearts_materials', JSON.stringify(materials));
    }

    let currentFile = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
      currentFile = e.target.files[0];
      if (currentFile) {
        document.getElementById('selectedFileName').innerHTML = `📄 ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB)`;
      } else {
        document.getElementById('selectedFileName').innerHTML = "No file selected";
      }
    });

    function uploadMaterial() {
      const title = document.getElementById('materialTitle').value.trim();
      const category = document.getElementById('materialCategory').value;
      const description = document.getElementById('materialDesc').value.trim();

      if (!title) {
        showToast("Please enter a title");
        return;
      }
      if (!description) {
        showToast("Please enter a description");
        return;
      }

      let fileData = null;
      let fileName = "No file";

      if (currentFile) {
        fileName = currentFile.name;
        // For demo, store as text (in production, store as base64 or upload to cloud)
        const reader = new FileReader();
        reader.onload = function(e) {
          fileData = e.target.result;
          saveMaterialToLocal(title, category, description, fileName, fileData);
        };
        reader.readAsDataURL(currentFile);
      } else {
        saveMaterialToLocal(title, category, description, fileName, null);
      }
    }

    function saveMaterialToLocal(title, category, description, fileName, fileData) {
      const newMaterial = {
        id: Date.now(),
        title: title,
        category: category,
        description: description,
        fileName: fileName,
        fileData: fileData,
        uploader: "Anonymous",
        timestamp: Date.now(),
        downloads: 0
      };
      materials.unshift(newMaterial);
      saveMaterials();
      
      // Clear form
      document.getElementById('materialTitle').value = "";
      document.getElementById('materialDesc').value = "";
      document.getElementById('fileInput').value = "";
      document.getElementById('selectedFileName').innerHTML = "No file selected";
      currentFile = null;
      
      showToast("📚 Material shared successfully!");
      renderMaterials();
    }

    function downloadMaterial(id) {
      const material = materials.find(m => m.id === id);
      if (material) {
        material.downloads++;
        saveMaterials();
        
        if (material.fileData) {
          // Create download link for stored file
          const link = document.createElement('a');
          link.href = material.fileData;
          link.download = material.fileName;
          link.click();
        } else {
          // For sample files, simulate download
          showToast(`📥 Downloading: ${material.fileName} (Demo - Add actual file to enable download)`);
        }
        renderMaterials();
      }
    }

    function deleteMaterial(id) {
      const material = materials.find(m => m.id === id);
      if (!material) return;
      
      if (isAdmin || confirm(`Delete "${material.title}"? This cannot be undone.`)) {
        materials = materials.filter(m => m.id !== id);
        saveMaterials();
        renderMaterials();
        showToast("🗑️ Material deleted");
      }
    }

    function toggleAdminMode() {
      if (!isAdmin) {
        const code = prompt("Enter Admin Code:");
        if (code === ADMIN_CODE) {
          isAdmin = true;
          document.getElementById('adminIndicator').style.display = 'inline-block';
          showToast("👑 Admin mode activated! You can delete any material.");
          renderMaterials();
        } else {
          showToast("❌ Wrong admin code!");
        }
      } else {
        isAdmin = false;
        document.getElementById('adminIndicator').style.display = 'none';
        showToast("Admin mode deactivated");
        renderMaterials();
      }
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 86400000);
      if (diff === 0) return "Today";
      if (diff === 1) return "Yesterday";
      return `${diff} days ago`;
    }

    function renderMaterials() {
      const container = document.getElementById('materialsGrid');
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || "";
      
      let filtered = materials;
      
      // Filter by category
      if (currentCategory !== "all") {
        filtered = filtered.filter(m => m.category === currentCategory);
      }
      
   // Filter by search
      if (searchTerm) {
        filtered = filtered.filter(m => 
          m.title.toLowerCase().includes(searchTerm) || 
          m.description.toLowerCase().includes(searchTerm)
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-book-open" style="font-size:3rem;margin-bottom:12px;display:block;"></i>
            <p>No study materials found. Be the first to share your notes! 📚</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(material => `
        <div class="material-card">
          <div class="material-header">
            <div class="material-title">📄 ${escapeHtml(material.title)}</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span class="material-badge">${material.category}</span>
              ${isAdmin ? `<button class="delete-material" onclick="deleteMaterial(${material.id})">🗑️</button>` : ''}
            </div>
          </div>
          <div class="material-description">${escapeHtml(material.description)}</div>
          <div class="material-meta">
            <span>👤 Anonymous • ${formatTime(material.timestamp)}</span>
            <span>⬇️ ${material.downloads} downloads</span>
          </div>
          <button class="download-btn" onclick="downloadMaterial(${material.id})">
            <i class="fas fa-download"></i> Download ${material.fileName !== "No file" ? material.fileName : "Material"}
          </button>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Category filter event listeners
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        renderMaterials();
      });
    });

    // Initial load
    loadMaterials();
  </script>
</body>
</html>
