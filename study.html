<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Study Segment 📚 - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ========================================
       STUDY SEGMENT - PREMIUM DARK THEME
       Pink Gradient | Study Material Library
       ======================================== */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 20, 147, 0.2);
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar.scrolled {
      padding: 12px 32px;
      background: rgba(10, 10, 15, 0.95);
    }
    .back-btn {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .back-btn:hover {
      color: #FF6B9D;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .admin-badge {
      background: rgba(255, 20, 147, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #FF6B9D;
    }
    .admin-btn {
      background: none;
      border: none;
      color: #FF6B9D;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    .admin-btn:hover {
      background: rgba(255, 20, 147, 0.15);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 90px 20px 100px;
    }
    
    .hero {
      text-align: center;
      margin-bottom: 30px;
    }
    .hero h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .hero p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }
    
    .category-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      padding: 10px 20px;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border-color: transparent;
      color: white;
    }
    .cat-btn:hover {
      transform: translateY(-2px);
    }
    
    .upload-section {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 30px;
    }
    .upload-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-row input, .form-row select, .form-row textarea {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 14px;
      padding: 12px 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }
    .form-row textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      border-color: #FF1493;
      background: rgba(255, 20, 147, 0.05);
    }
    
    .file-input-wrapper {
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255,20,147,0.3);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-input-wrapper:hover {
      background: rgba(255, 20, 147, 0.05);
      border-color: #FF1493;
    }
    .file-input-wrapper input {
      display: none;
    }
    .selected-file {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
    }
    .upload-btn {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      padding: 14px;
      border-radius: 100px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3);
    }
    
    .sort-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .sort-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .sort-buttons {
      display: flex;
      gap: 8px;
    }
    .sort-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255, 255, 255, 0.7);
    }
    .sort-btn.active {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      color: white;
      border-color: transparent;
    }
    
    .category-stats {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,20,147,0.1);
    }
    
    .materials-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .material-card {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.15);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.3s;
    }
    .material-card:hover {
      border-color: rgba(255,20,147,0.4);
      transform: translateY(-2px);
    }
    .material-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .material-title {
      font-size: 1rem;
      font-weight: 700;
      color: #FF6B9D;
    }
    .material-badge {
      background: rgba(255, 20, 147, 0.12);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      color: #FF6B9D;
    }
    .admin-delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 20px;
      transition: all 0.2s;
    }
    .admin-delete-btn:hover {
      color: #FF1493;
      background: rgba(255, 20, 147, 0.1);
    }
    .material-description {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .material-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }
    .download-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,20,147,0.2);
      padding: 8px 16px;
      border-radius: 100px;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .download-btn:hover {
      background: #FF1493;
      border-color: #FF1493;
      transform: translateY(-2px);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.4);
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #141423;
      border: 1px solid rgba(255,20,147,0.3);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      z-index: 200;
      display: none;
    }
    .toast.show {
      display: block;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="logo">📚 Study Segment</div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <span id="adminIndicator" class="admin-badge" style="display: none;">👑 Admin</span>
      <button class="admin-btn" onclick="toggleAdminMode()">Admin</button>
    </div>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>📖 Study Material Library</h1>
      <p>Share and download notes, past questions, and study resources</p>
      <p style="font-size:0.7rem; margin-top:5px; color: rgba(255,255,255,0.4);">⚠️ Uploaded files become property of EntranceHearts. Only Admin can delete.</p>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <button class="cat-btn active" data-cat="all">📚 All Materials</button>
      <button class="cat-btn" data-cat="CEE">🏥 CEE (MBBS)</button>
      <button class="cat-btn" data-cat="IOE">⚙️ IOE (Engineering)</button>
      <button class="cat-btn" data-cat="+2">📖 +2 (Science)</button>
      <button class="cat-btn" data-cat="Management">💼 Management</button>
    </div>

    <!-- Upload Section -->
    <div class="upload-section">
      <div class="upload-title">
        <span>📤</span> Share Your Study Material
      </div>
      <div class="upload-form">
        <div class="form-row">
          <input type="text" id="materialTitle" placeholder="Title (e.g., Physics Notes - Unit 1)">
          <select id="materialCategory">
            <option value="CEE">CEE (MBBS)</option>
            <option value="IOE">IOE (Engineering)</option>
            <option value="+2">+2 (Science)</option>
            <option value="Management">Management</option>
          </select>
        </div>
        <div class="form-row">
          <textarea id="materialDesc" placeholder="Description (what's included, which chapter, etc.)"></textarea>
        </div>
        <div class="file-input-wrapper" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt"></i> Click to upload PDF/File
          <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.jpg,.png">
        </div>
        <div id="selectedFileName" class="selected-file">No file selected</div>
        <button class="upload-btn" onclick="uploadMaterial()">📤 Share Material</button>
      </div>
    </div>

    <!-- Sort Options -->
    <div class="sort-section">
      <span class="sort-label"><i class="fas fa-sort"></i> Sort by:</span>
      <div class="sort-buttons">
        <button class="sort-btn active" data-sort="newest">📅 Newest First</button>
        <button class="sort-btn" data-sort="oldest">📅 Oldest First</button>
        <button class="sort-btn" data-sort="downloads">⬇️ Most Downloads</button>
      </div>
    </div>

    <!-- Materials Grid -->
    <div id="categoryStats" class="category-stats"></div>
    <div id="materialsGrid" class="materials-grid"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let materials = [];
    let currentCategory = "all";
    let currentSort = "newest";
    let isAdmin = false;
    const ADMIN_CODE = "drsaurab@2022";

    function loadMaterials() {
      const saved = localStorage.getItem('entrancehearts_materials_v2');
      if (saved) {
        materials = JSON.parse(saved);
      } else {
        materials = [
          {
            id: 1,
            title: "CEE Previous Year Questions (2078-2080)",
            category: "CEE",
            description: "Complete collection of past year questions with answer keys. Includes Physics, Chemistry, Biology, and IQ.",
            fileName: "CEE_PYQ_2078_2080.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now(),
            downloads: 245
          },
          {
            id: 2,
            title: "IOE Entrance Preparation Guide",
            category: "IOE",
            description: "Complete guide for IOE entrance exam. Includes tips, tricks, and important formulas.",
            fileName: "IOE_Preparation_Guide.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now() - 86400000,
            downloads: 189
          },
          {
            id: 3,
            title: "+2 Physics Handwritten Notes (Mechanics)",
            category: "+2",
            description: "Complete handwritten notes covering Kinematics, Laws of Motion, Work Power Energy.",
            fileName: "Physics_Mechanics_Notes.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now() - 172800000,
            downloads: 312
          },
          {
            id: 4,
            title: "Management - Accountancy Formulas",
            category: "Management",
            description: "All important accountancy formulas for +2 Management students.",
            fileName: "Accountancy_Formulas.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now() - 259200000,
            downloads: 156
          },
          {
            id: 5,
            title: "CEE Biology Important Diagrams",
            category: "CEE",
            description: "Must-know diagrams for CEE entrance exam.",
            fileName: "Biology_Diagrams_CEE.pdf",
            fileData: null,
            uploader: "Anonymous",
            timestamp: Date.now() - 345600000,
            downloads: 178
          }
        ];
        saveMaterials();
      }
      renderMaterials();
    }

    function saveMaterials() {
      localStorage.setItem('entrancehearts_materials_v2', JSON.stringify(materials));
    }

    let currentFile = null;

    document.getElementById('fileInput').addEventListener('change', function(e) {
      currentFile = e.target.files[0];
      if (currentFile) {
        document.getElementById('selectedFileName').innerHTML = `📄 ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB)`;
      } else {
        document.getElementById('selectedFileName').innerHTML = "No file selected";
      }
    });

    function uploadMaterial() {
      const title = document.getElementById('materialTitle').value.trim();
      const category = document.getElementById('materialCategory').value;
      const description = document.getElementById('materialDesc').value.trim();

      if (!title) {
        showToast("Please enter a title");
        return;
      }
      if (!description) {
        showToast("Please enter a description");
        return;
      }

      let fileData = null;
      let fileName = "No file";

      if (currentFile) {
        fileName = currentFile.name;
        const reader = new FileReader();
        reader.onload = function(e) {
          fileData = e.target.result;
          saveMaterialToLocal(title, category, description, fileName, fileData);
        };
        reader.readAsDataURL(currentFile);
      } else {
        saveMaterialToLocal(title, category, description, fileName, null);
      }
    }

    function saveMaterialToLocal(title, category, description, fileName, fileData) {
      const newMaterial = {
        id: Date.now(),
        title: title,
        category: category,
        description: description,
        fileName: fileName,
        fileData: fileData,
        uploader: "Anonymous",
        timestamp: Date.now(),
        downloads: 0
      };
      materials.unshift(newMaterial);
      saveMaterials();
      
      document.getElementById('materialTitle').value = "";
      document.getElementById('materialDesc').value = "";
      document.getElementById('fileInput').value = "";
      document.getElementById('selectedFileName').innerHTML = "No file selected";
      currentFile = null;
      
      showToast("📚 Material shared successfully! (Admin only can delete)");
      renderMaterials();
    }

    function downloadMaterial(id) {
      const material = materials.find(m => m.id === id);
      if (material) {
        material.downloads++;
        saveMaterials();
        
        if (material.fileData) {
          const link = document.createElement('a');
          link.href = material.fileData;
          link.download = material.fileName;
          link.click();
          showToast(`📥 Downloading: ${material.fileName}`);
        } else {
          showToast(`📥 Demo: ${material.fileName} (Add actual file to enable download)`);
        }
        renderMaterials();
      }
    }

    function deleteMaterial(id) {
      if (!isAdmin) {
        showToast("❌ Only Admin can delete study materials.");
        return;
      }
      
      const material = materials.find(m => m.id === id);
      if (material && confirm(`Delete "${material.title}"? This cannot be undone.`)) {
        materials = materials.filter(m => m.id !== id);
        saveMaterials();
        renderMaterials();
        showToast("🗑️ Material deleted by Admin");
      }
    }

    function toggleAdminMode() {
      if (!isAdmin) {
        const code = prompt("Enter Admin Code:");
        if (code === ADMIN_CODE) {
          isAdmin = true;
          document.getElementById('adminIndicator').style.display = 'inline-block';
          showToast("👑 Admin mode activated! You can delete any study material.");
          renderMaterials();
        } else {
          showToast("❌ Wrong admin code!");
        }
      } else {
        isAdmin = false;
        document.getElementById('adminIndicator').style.display = 'none';
        showToast("Admin mode deactivated");
        renderMaterials();
      }
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 86400000);
      if (diff === 0) return "Today";
      if (diff === 1) return "Yesterday";
      return `${diff} days ago`;
    }

    function getSortedMaterials(filteredMaterials) {
      const sorted = [...filteredMaterials];
      if (currentSort === "newest") {
        sorted.sort((a, b) => b.timestamp - a.timestamp);
      } else if (currentSort === "oldest") {
        sorted.sort((a, b) => a.timestamp - b.timestamp);
      } else if (currentSort === "downloads") {
        sorted.sort((a, b) => b.downloads - a.downloads);
      }
      return sorted;
    }

    function renderMaterials() {
      const container = document.getElementById('materialsGrid');
      const statsContainer = document.getElementById('categoryStats');
      
      let filtered = materials;
      
      if (currentCategory !== "all") {
        filtered = filtered.filter(m => m.category === currentCategory);
      }
      
          const sortedMaterials = getSortedMaterials(filtered);
      
      const categoryNames = {
        'all': 'All Categories',
        'CEE': '🏥 CEE (MBBS)',
        'IOE': '⚙️ IOE (Engineering)',
        '+2': '📖 +2 (Science)',
        'Management': '💼 Management'
      };
      const categoryDisplay = categoryNames[currentCategory] || 'All Categories';
      statsContainer.innerHTML = `📚 ${categoryDisplay} • ${sortedMaterials.length} ${sortedMaterials.length === 1 ? 'material' : 'materials'}`;

      if (sortedMaterials.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-book-open" style="font-size:3rem;margin-bottom:12px;display:block;"></i>
            <p>No study materials in this category. Be the first to share your notes! 📚</p>
          </div>
        `;
        return;
      }

      container.innerHTML = sortedMaterials.map(material => `
        <div class="material-card">
          <div class="material-header">
            <div class="material-title">📄 ${escapeHtml(material.title)}</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span class="material-badge">${material.category}</span>
              ${isAdmin ? `<button class="admin-delete-btn" onclick="deleteMaterial(${material.id})">🗑️</button>` : ''}
            </div>
          </div>
          <div class="material-description">${escapeHtml(material.description)}</div>
          <div class="material-meta">
            <span>👤 Anonymous • ${formatTime(material.timestamp)}</span>
            <span>⬇️ ${material.downloads} downloads</span>
          </div>
          <button class="download-btn" onclick="downloadMaterial(${material.id})">
            <i class="fas fa-download"></i> Download ${material.fileName !== "No file" ? material.fileName : "Material"}
          </button>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.cat;
        renderMaterials();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        renderMaterials();
      });
    });

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else if (navbar) {
        navbar.classList.remove('scrolled');
      }
    });

    loadMaterials();
  </script>
</body>
</html>
