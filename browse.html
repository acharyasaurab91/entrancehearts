<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Discover — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    /* Browse specific premium styles */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 16px 100px;
    }
    
    .page-header {
      margin-bottom: 24px;
    }
    
    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .page-sub {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }
    
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    
    .filter-row::-webkit-scrollbar {
      display: none;
    }
    
    .filter-btn {
      padding: 8px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .filter-btn.active {
      background: var(--gradient-primary);
      border-color: transparent;
      color: white;
    }
    
    .swipe-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.3s;
      animation: fadeInScale 0.4s ease;
    }
    
    .swipe-card.hide-left {
      transform: translateX(-120%) rotate(-15deg);
      opacity: 0;
      transition: all 0.4s ease;
    }
    
    .swipe-card.hide-right {
      transform: translateX(120%) rotate(15deg);
      opacity: 0;
      transition: all 0.4s ease;
    }
    
    .card-photo {
      width: 100%;
      height: 320px;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      position: relative;
      overflow: hidden;
    }
    
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-body {
      padding: 20px;
    }
    
    .ai-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid rgba(255, 107, 157, 0.3);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .card-name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    
    .card-name {
      font-size: 1.4rem;
      font-weight: 700;
    }
    
    .card-age {
      color: var(--text-muted);
      font-size: 1rem;
    }
    
    .card-category {
      display: inline-block;
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid rgba(255, 107, 157, 0.3);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .card-location {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 12px;
    }
    
    .card-bio {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    
    .card-interests {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .card-interests span {
      background: var(--bg-card-hover);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.7rem;
    }
    
    .action-row {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 50px;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-pass {
      background: var(--bg-card-hover);
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
    }
    
    .btn-pass:hover {
      border-color: var(--error);
      color: var(--error);
      transform: scale(1.02);
    }
    
    .btn-like {
      background: var(--gradient-primary);
      color: white;
    }
    
    .btn-like:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-glow);
    }
    
    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .loading-spin {
      font-size: 3rem;
      animation: spin 1s linear infinite;
      display: block;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }
    
    .e-emoji {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    
    .empty-state p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    /* Match Popup */
    .match-popup {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .match-popup.show {
      display: flex;
    }
    
    .match-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glow);
      border-radius: 32px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes popIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .match-hearts {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: pulse 1s ease-in-out infinite;
    }
    
    .match-title {
      font-size: 1.8rem;
      font-weight: 900;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .match-sub {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    
    .match-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .match-btn:hover {
      transform: translateY(-2px);
    }
    
    .skip-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border-medium);
      border-radius: 50px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    
    .skip-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .profile-btn {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 50px;
      transition: all 0.2s;
    }
    
    .profile-btn:hover {
      color: var(--primary);
      background: rgba(255, 107, 157, 0.1);
    }
  </style>
</head>
<body>

  <!-- Premium Navbar -->
  <nav class="navbar">
    <div style="max-width: 1280px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo" style="text-decoration: none;">💕 EntranceHearts</a>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        <a href="profile.html" class="profile-btn">👤 Profile</a>
        <a href="chat.html" class="btn-ghost" style="padding: 8px 20px;">💬 Chats</a>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" style="display: none;">☰</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Discover 🔥</div>
      <div class="page-sub">Find your match among aspirants</div>
    </div>
    
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
      <button class="filter-btn" onclick="filterCards('cee',this)">🎓 CEE</button>
      <button class="filter-btn" onclick="filterCards('ioe',this)">⚙️ IOE</button>
      <button class="filter-btn" onclick="filterCards('plus2',this)">📚 +2</button>
      <button class="filter-btn" onclick="filterCards('management',this)">💼 Management</button>
    </div>
    
    <div id="cardsContainer">
      <div class="loading-state">
        <span class="loading-spin">💕</span>
        <p style="color: var(--text-muted)">Finding aspirants...</p>
      </div>
    </div>
    
    <div class="empty-state" id="emptyState">
      <div class="e-emoji">💔</div>
      <h3>No more profiles!</h3>
      <p>You've seen everyone. Check back later!</p>
    </div>
  </div>

  <!-- Match Popup -->
  <div class="match-popup" id="matchPopup">
    <div class="match-box">
      <div class="match-hearts">💕</div>
      <div class="match-title">It's a Match!</div>
      <div class="match-sub" id="matchSubText"></div>
      <a href="chat.html" class="match-btn">💬 Send Message</a>
      <button class="skip-btn" onclick="closeMatch()">Keep Browsing</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="browse.html" class="nav-item active"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const categoryLabels = {
      cee:'CEE Aspirant', ioe:'IOE Aspirant',
      plus2:'+2 Student', management:'Management Student'
    };
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    let currentUserId = null;
    let allProfiles = [];
    let seenIds = JSON.parse(localStorage.getItem('ehSeen') || '[]');
    let currentFilter = 'all';
    let currentProfile = null;

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;
      await loadProfiles();
    }

    async function loadProfiles() {
      const { data } = await supabaseClient
        .from('profiles').select('*').neq('id', currentUserId);
      allProfiles = data || [];
      renderNextCard();
    }

    function getFiltered() {
      return allProfiles.filter(p => {
        const notSeen = !seenIds.includes(p.id);
        const matchFilter = currentFilter === 'all' || p.category === currentFilter;
        return notSeen && matchFilter;
      });
    }

    function renderNextCard() {
      const container = document.getElementById('cardsContainer');
      const filtered = getFiltered();
      if (filtered.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';
      currentProfile = filtered[0];
      const hasPhoto = currentProfile.avatar_url;
      container.innerHTML = `
        <div class="swipe-card" id="currentCard">
          <div class="card-photo">
            ${hasPhoto
              ? `<img src="${currentProfile.avatar_url}" alt="${currentProfile.name}"/>`
              : genderEmoji[currentProfile.gender] || '🧑'}
          </div>
          <div class="card-body">
            <div class="ai-tag">🤖 Suggested for you</div>
            <div class="card-name-row">
              <div class="card-name">${currentProfile.name}</div>
              <div class="card-age">${currentProfile.age || ''}</div>
            </div>
            <div class="card-category">
              ${categoryLabels[currentProfile.category] || currentProfile.category}
            </div>
            <div class="card-location">📍 ${currentProfile.location || 'Nepal'}</div>
            ${currentProfile.bio
              ? `<div class="card-bio">${currentProfile.bio}</div>` : ''}
            <div class="card-interests">
              ${(currentProfile.interests || []).map(i =>
                `<span>${i}</span>`).join('')}
            </div>
            <div class="action-row">
              <button class="action-btn btn-pass" onclick="passProfile()">👎 Pass</button>
              <button class="action-btn btn-like" onclick="likeProfile()">❤️ Like</button>
            </div>
          </div>
        </div>`;
    }

    async function likeProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-right');
      await supabaseClient.from('likes').insert({
        from_user: currentUserId, to_user: currentProfile.id
      });
      const { data: mutual } = await supabaseClient
        .from('likes').select('*')
        .eq('from_user', currentProfile.id)
        .eq('to_user', currentUserId);
      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      setTimeout(() => {
        if (mutual && mutual.length > 0) showMatch(currentProfile.name);
        else renderNextCard();
      }, 400);
    }

    function passProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-left');
      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      setTimeout(() => renderNextCard(), 400);
    }

    function showMatch(name) {
      document.getElementById('matchSubText').textContent =
        `You and ${name} liked each other! 🎉`;
      document.getElementById('matchPopup').classList.add('show');
    }

    function closeMatch() {
      document.getElementById('matchPopup').classList.remove('show');
      renderNextCard();
    }

    function filterCards(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.remove('active'));
      btn.classList.add('active');
      seenIds = [];
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      renderNextCard();
    }

    // Dark Mode Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      const themeToggle = document.getElementById('themeToggle');
      
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        if (themeToggle) themeToggle.textContent = '🌙';
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        if (themeToggle) themeToggle.textContent = '☀️';
      }
    }
    
    const savedTheme = localStorage.getItem('theme');
    const themeToggle = document.getElementById('themeToggle');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      if (themeToggle) themeToggle.textContent = '☀️';
    }

    // Page transition
    document.body.classList.add('fade-in');
    
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (navbar && window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else if (navbar) {
        navbar.classList.remove('scrolled');
      }
    });

    init();
  </script>
</body>
</html>
