<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body { background: #1a1a2e; }
    .browse-page {
      min-height: 100vh;
      padding: 20px 16px 100px;
      max-width: 480px;
      margin: 0 auto;
    }
    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .page-sub {
      color: #a0a0b0;
      font-size: 0.82rem;
      margin-bottom: 24px;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .filter-btn {
      padding: 7px 16px;
      background: #0f3460;
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 20px;
      color: #a0a0b0;
      font-size: 0.78rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: rgba(255,107,157,0.15);
      border-color: #ff6b9d;
      color: #ff6b9d;
    }
    .swipe-card {
      background: #0f3460;
      border-radius: 24px;
      padding: 28px 20px;
      border: 1px solid rgba(255,107,157,0.2);
      margin-bottom: 16px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .swipe-card.hide-left {
      transform: translateX(-120%) rotate(-15deg);
      opacity: 0;
    }
    .swipe-card.hide-right {
      transform: translateX(120%) rotate(15deg);
      opacity: 0;
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .big-avatar {
      font-size: 3.5rem;
      background: rgba(230,57,70,0.1);
      border-radius: 50%;
      width: 75px;
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,107,157,0.3);
      flex-shrink: 0;
    }
    .card-name { font-size: 1.2rem; font-weight: 700; }
    .card-meta { color: #a0a0b0; font-size: 0.8rem; margin: 3px 0 8px; }
    .card-category {
      display: inline-block;
      background: rgba(230,57,70,0.15);
      border: 1px solid #e63946;
      color: #ff6b9d;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .card-interests {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .card-interests span {
      background: rgba(255,107,157,0.1);
      border: 1px solid rgba(255,107,157,0.2);
      color: #ff6b9d;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
    }
    .action-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .action-btn:hover { transform: scale(1.05); }
    .btn-pass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #a0a0b0;
    }
    .btn-like {
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      color: white;
      box-shadow: 0 5px 20px rgba(230,57,70,0.3);
    }
    .match-popup {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .match-popup.show { display: flex; }
    .match-box {
      background: #0f3460;
      border-radius: 28px;
      padding: 40px 28px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      border: 1px solid rgba(255,107,157,0.3);
      animation: popIn 0.4s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .match-emoji { font-size: 4rem; margin-bottom: 10px; }
    .match-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e63946, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .match-sub { color: #a0a0b0; font-size: 0.85rem; margin-bottom: 24px; }
    .match-actions { display: flex; flex-direction: column; gap: 10px; }
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0f3460;
      border-top: 1px solid rgba(255,107,157,0.15);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 16px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #a0a0b0;
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .nav-item.active { color: #ff6b9d; }
    .nav-item span:first-child { font-size: 1.3rem; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }
    .empty-state .big-emoji { font-size: 4rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.2rem; margin-bottom: 8px; }
    .empty-state p { color: #a0a0b0; font-size: 0.85rem; }
    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }
    .loading-spinner {
      font-size: 3rem;
      animation: spin 1s linear infinite;
      display: block;
      margin-bottom: 14px;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,107,157,0.1);
      border: 1px solid rgba(255,107,157,0.3);
      color: #ff6b9d;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">💕 EntranceHearts</a>
    <div class="nav-buttons">
      <a href="profile.html" class="btn-outline"
        style="padding:8px 14px;font-size:0.8rem">My Profile</a>
    </div>
  </nav>

  <div class="browse-page">
    <div class="page-title">Discover 💕</div>
    <div class="page-sub">Find your match among aspirants</div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
      <button class="filter-btn" onclick="filterCards('cee', this)">CEE</button>
      <button class="filter-btn" onclick="filterCards('ioe', this)">IOE</button>
      <button class="filter-btn" onclick="filterCards('plus2', this)">+2</button>
      <button class="filter-btn" onclick="filterCards('management', this)">Management</button>
    </div>

    <div id="cardsContainer">
      <div class="loading-state">
        <span class="loading-spinner">💕</span>
        <p style="color:#a0a0b0">Finding aspirants near you...</p>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="big-emoji">💔</div>
      <h3>No more profiles!</h3>
      <p>You've seen everyone for now. Check back later!</p>
    </div>
  </div>

  <!-- Match Popup -->
  <div class="match-popup" id="matchPopup">
    <div class="match-box">
      <div class="match-emoji">💕</div>
      <div class="match-title">It's a Match!</div>
      <div class="match-sub" id="matchSubText"></div>
      <div class="match-actions">
        <a href="chat.html" class="btn-primary big" style="text-align:center">
          💬 Send a Message
        </a>
        <button onclick="closeMatch()"
          style="background:transparent;border:1px solid rgba(255,107,157,0.3);
          border-radius:12px;padding:12px;color:#ff6b9d;font-family:'Poppins',sans-serif;
          cursor:pointer;font-size:0.9rem;margin-top:0">
          Keep Browsing
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="browse.html" class="nav-item active">
      <span>🔥</span><span>Discover</span>
    </a>
    <a href="chat.html" class="nav-item">
      <span>💬</span><span>Chats</span>
    </a>
    <a href="ai-match.html" class="nav-item">
      <span>🤖</span><span>AI Match</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span>👤</span><span>Profile</span>
    </a>
  </div>

  <script>
    const categoryLabels = {
      cee: 'CEE Aspirant',
      ioe: 'IOE Aspirant',
      plus2: '+2 Student',
      management: 'Management Student'
    };
    const genderEmoji = { male: '👨', female: '👩', other: '🧑' };

    let currentUserId = null;
    let allProfiles = [];
    let seenIds = JSON.parse(localStorage.getItem('ehSeen') || '[]');
    let currentFilter = 'all';
    let currentProfile = null;

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = 'login.html';
        return;
      }
      currentUserId = data.session.user.id;
      await loadProfiles();
    }

    async function loadProfiles() {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .neq('id', currentUserId);

      if (error) {
        document.getElementById('cardsContainer').innerHTML =
          '<p style="color:#e63946;text-align:center">Error loading profiles. Try again!</p>';
        return;
      }

      allProfiles = data || [];
      renderNextCard();
    }

    function getFilteredProfiles() {
      return allProfiles.filter(p => {
        const notSeen = !seenIds.includes(p.id);
        const matchFilter = currentFilter === 'all' || p.category === currentFilter;
        return notSeen && matchFilter;
      });
    }

    function renderNextCard() {
      const container = document.getElementById('cardsContainer');
      const filtered = getFilteredProfiles();

      if (filtered.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      currentProfile = filtered[0];

      container.innerHTML = `
        <div class="swipe-card" id="currentCard">
          <div class="ai-badge">🤖 Suggested for you</div>
          <div class="card-top">
            <div class="big-avatar">
              ${genderEmoji[currentProfile.gender] || '🧑'}
            </div>
            <div>
              <div class="card-name">
                ${currentProfile.name}, ${currentProfile.age || ''}
              </div>
              <div class="card-meta">📍 ${currentProfile.location || 'Nepal'}</div>
              <div class="card-category">
                ${categoryLabels[currentProfile.category] || currentProfile.category}
              </div>
            </div>
          </div>
          <div class="card-interests">
            ${(currentProfile.interests || []).map(i =>
              `<span>${i}</span>`).join('')}
          </div>
          <div class="action-row">
            <button class="action-btn btn-pass"
              onclick="passProfile()">👎 Pass</button>
            <button class="action-btn btn-like"
              onclick="likeProfile()">❤️ Like</button>
          </div>
        </div>
      `;
    }

    async function likeProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-right');

      // Save like to Supabase
      await supabaseClient.from('likes').insert({
        from_user: currentUserId,
        to_user: currentProfile.id
      });

      // Check if they liked us back
      const { data: mutualLike } = await supabaseClient
        .from('likes')
        .select('*')
        .eq('from_user', currentProfile.id)
        .eq('to_user', currentUserId);

      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));

      setTimeout(() => {
        if (mutualLike && mutualLike.length > 0) {
          showMatch(currentProfile.name);
        } else {
          renderNextCard();
        }
      }, 400);
    }

    function passProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-left');
      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      setTimeout(() => renderNextCard(), 400);
    }

    function showMatch(name) {
      document.getElementById('matchSubText').textContent =
        `You and ${name} liked each other! 🎉`;
      document.getElementById('matchPopup').classList.add('show');
    }

    function closeMatch() {
      document.getElementById('matchPopup').classList.remove('show');
      renderNextCard();
    }

    function filterCards(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.remove('active'));
      btn.classList.add('active');
      seenIds = [];
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      renderNextCard();
    }

    init();
  </script>

</body>
</html>
