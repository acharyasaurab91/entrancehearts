<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; color:#fff; font-family:'Poppins',sans-serif; }
    .navbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 20px;
      background:rgba(10,10,15,0.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size:1.1rem; font-weight:800;
      background:linear-gradient(135deg,#ff6b9d,#e63946);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .page { max-width:480px; margin:0 auto; padding:70px 16px 90px; }
    .page-header { margin-bottom:20px; }
    .page-title { font-size:1.5rem; font-weight:800; }
    .page-sub { color:rgba(255,255,255,0.4); font-size:0.82rem; margin-top:2px; }
    .filter-row {
      display:flex; gap:8px; margin-bottom:20px;
      overflow-x:auto; padding-bottom:4px;
    }
    .filter-row::-webkit-scrollbar { display:none; }
    .filter-btn {
      padding:7px 16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:50px; color:rgba(255,255,255,0.5);
      font-size:0.78rem; font-family:'Poppins',sans-serif;
      cursor:pointer; white-space:nowrap; transition:all 0.2s;
    }
    .filter-btn.active {
      background:rgba(255,107,157,0.15);
      border-color:rgba(255,107,157,0.5);
      color:#ff6b9d;
    }
    .swipe-card {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:28px; overflow:hidden;
      transition:transform 0.3s, opacity 0.3s;
    }
    .swipe-card.hide-left {
      transform:translateX(-120%) rotate(-15deg); opacity:0;
    }
    .swipe-card.hide-right {
      transform:translateX(120%) rotate(15deg); opacity:0;
    }
    .card-photo {
      width:100%; height:280px;
      background:linear-gradient(135deg,#1a1a2e,#0f3460);
      display:flex; align-items:center; justify-content:center;
      font-size:6rem; position:relative; overflow:hidden;
    }
    .card-photo img {
      width:100%; height:100%; object-fit:cover;
    }
    .card-photo-overlay {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(transparent, rgba(10,10,15,0.9));
      padding:20px 20px 0;
    }
    .card-body { padding:16px 20px 20px; }
    .card-name-row {
      display:flex; justify-content:space-between;
      align-items:flex-start; margin-bottom:8px;
    }
    .card-name { font-size:1.3rem; font-weight:800; }
    .card-age { color:rgba(255,255,255,0.5); font-size:1rem; }
    .card-category {
      display:inline-block;
      background:rgba(255,107,157,0.1);
      border:1px solid rgba(255,107,157,0.3);
      color:#ff6b9d; padding:3px 12px;
      border-radius:50px; font-size:0.72rem; font-weight:600;
      margin-bottom:10px;
    }
    .card-location {
      color:rgba(255,255,255,0.4); font-size:0.8rem; margin-bottom:12px;
    }
    .card-bio {
      color:rgba(255,255,255,0.6); font-size:0.85rem;
      line-height:1.6; margin-bottom:14px;
    }
    .card-interests {
      display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px;
    }
    .card-interests span {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.6);
      padding:4px 12px; border-radius:50px; font-size:0.72rem;
    }
    .action-row {
      display:flex; gap:12px; justify-content:center;
    }
    .action-btn {
      flex:1; padding:15px; border-radius:16px; border:none;
      font-size:1.3rem; cursor:pointer;
      font-family:'Poppins',sans-serif; font-weight:700;
      transition:all 0.2s;
    }
    .action-btn:hover { transform:scale(1.05); }
    .btn-pass {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.5);
    }
    .btn-like {
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      color:white;
      box-shadow:0 8px 24px rgba(230,57,70,0.35);
    }
    .match-popup {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.9); display:none;
      align-items:center; justify-content:center; z-index:999;
    }
    .match-popup.show { display:flex; }
    .match-box {
      background:#0f0f1a;
      border:1px solid rgba(255,107,157,0.2);
      border-radius:28px; padding:40px 28px;
      text-align:center; max-width:320px; width:90%;
      animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn {
      from { transform:scale(0.5); opacity:0; }
      to { transform:scale(1); opacity:1; }
    }
    .match-hearts { font-size:3.5rem; margin-bottom:12px; }
    .match-title {
      font-size:2rem; font-weight:900;
      background:linear-gradient(135deg,#ff6b9d,#e63946);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:6px;
    }
    .match-sub { color:rgba(255,255,255,0.45); font-size:0.85rem; margin-bottom:24px; }
    .match-btn {
      display:block; width:100%; padding:14px;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      border:none; border-radius:14px; color:white;
      font-size:0.95rem; font-weight:700;
      font-family:'Poppins',sans-serif; cursor:pointer;
      text-decoration:none; text-align:center; margin-bottom:10px;
    }
    .skip-btn {
      background:transparent;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; padding:12px; width:100%;
      color:rgba(255,255,255,0.4); font-family:'Poppins',sans-serif;
      cursor:pointer; font-size:0.85rem;
    }
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(10,10,15,0.98);
      border-top:1px solid rgba(255,255,255,0.05);
      display:flex; justify-content:space-around;
      padding:10px 0 16px; z-index:100;
      backdrop-filter:blur(20px);
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center;
      gap:3px; color:rgba(255,255,255,0.3);
      text-decoration:none; font-size:0.62rem; font-weight:600;
      transition:color 0.2s;
    }
    .nav-item.active { color:#ff6b9d; }
    .nav-item span:first-child { font-size:1.3rem; }
    .empty-state {
      text-align:center; padding:60px 20px; display:none;
    }
    .empty-state .e-emoji { font-size:4rem; margin-bottom:16px; }
    .empty-state h3 { font-size:1.1rem; margin-bottom:8px; }
    .empty-state p { color:rgba(255,255,255,0.4); font-size:0.82rem; }
    .loading-state { text-align:center; padding:60px 20px; }
    .loading-spin {
      font-size:2.5rem; animation:spin 1s linear infinite;
      display:block; margin-bottom:14px;
    }
    @keyframes spin {
      from { transform:rotate(0deg); }
      to { transform:rotate(360deg); }
    }
    .ai-tag {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(255,107,157,0.08);
      border:1px solid rgba(255,107,157,0.2);
      color:#ff6b9d; padding:4px 12px;
      border-radius:50px; font-size:0.72rem; font-weight:600;
      margin-bottom:14px;
    }
    .profile-btn {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.7);
      padding:7px 14px; border-radius:50px;
      text-decoration:none; font-size:0.78rem; font-weight:600;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">💕 EntranceHearts</div>
    <a href="profile.html" class="profile-btn">👤 Profile</a>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Discover 🔥</div>
      <div class="page-sub">Find your match among aspirants</div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
      <button class="filter-btn" onclick="filterCards('cee',this)">CEE</button>
      <button class="filter-btn" onclick="filterCards('ioe',this)">IOE</button>
      <button class="filter-btn" onclick="filterCards('plus2',this)">+2</button>
      <button class="filter-btn" onclick="filterCards('management',this)">Management</button>
    </div>
    <div id="cardsContainer">
      <div class="loading-state">
        <span class="loading-spin">💕</span>
        <p style="color:rgba(255,255,255,0.4)">Finding aspirants...</p>
      </div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="e-emoji">💔</div>
      <h3>No more profiles!</h3>
      <p>You've seen everyone. Check back later!</p>
    </div>
  </div>

  <div class="match-popup" id="matchPopup">
    <div class="match-box">
      <div class="match-hearts">💕</div>
      <div class="match-title">It's a Match!</div>
      <div class="match-sub" id="matchSubText"></div>
      <a href="chat.html" class="match-btn">💬 Send Message</a>
      <button class="skip-btn" onclick="closeMatch()">Keep Browsing</button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item active"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const categoryLabels = {
      cee:'CEE Aspirant', ioe:'IOE Aspirant',
      plus2:'+2 Student', management:'Management Student'
    };
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    let currentUserId = null;
    let allProfiles = [];
    let seenIds = JSON.parse(localStorage.getItem('ehSeen') || '[]');
    let currentFilter = 'all';
    let currentProfile = null;

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;
      await loadProfiles();
    }

    async function loadProfiles() {
      const { data } = await supabaseClient
        .from('profiles').select('*').neq('id', currentUserId);
      allProfiles = data || [];
      renderNextCard();
    }

    function getFiltered() {
      return allProfiles.filter(p => {
        const notSeen = !seenIds.includes(p.id);
        const matchFilter = currentFilter === 'all' || p.category === currentFilter;
        return notSeen && matchFilter;
      });
    }

    function renderNextCard() {
      const container = document.getElementById('cardsContainer');
      const filtered = getFiltered();
      if (filtered.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';
      currentProfile = filtered[0];
      const hasPhoto = currentProfile.avatar_url;
      container.innerHTML = `
        <div class="swipe-card" id="currentCard">
          <div class="card-photo">
            ${hasPhoto
              ? `<img src="${currentProfile.avatar_url}" alt="${currentProfile.name}"/>`
              : genderEmoji[currentProfile.gender] || '🧑'}
          </div>
          <div class="card-body">
            <div class="ai-tag">🤖 Suggested for you</div>
            <div class="card-name-row">
              <div class="card-name">${currentProfile.name}</div>
              <div class="card-age">${currentProfile.age || ''}</div>
            </div>
            <div class="card-category">
              ${categoryLabels[currentProfile.category] || currentProfile.category}
            </div>
            <div class="card-location">📍 ${currentProfile.location || 'Nepal'}</div>
            ${currentProfile.bio
              ? `<div class="card-bio">${currentProfile.bio}</div>` : ''}
            <div class="card-interests">
              ${(currentProfile.interests || []).map(i =>
                `<span>${i}</span>`).join('')}
            </div>
            <div class="action-row">
              <button class="action-btn btn-pass" onclick="passProfile()">👎 Pass</button>
              <button class="action-btn btn-like" onclick="likeProfile()">❤️ Like</button>
            </div>
          </div>
        </div>`;
    }

    async function likeProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-right');
      await supabaseClient.from('likes').insert({
        from_user: currentUserId, to_user: currentProfile.id
      });
      const { data: mutual } = await supabaseClient
        .from('likes').select('*')
        .eq('from_user', currentProfile.id)
        .eq('to_user', currentUserId);
      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      setTimeout(() => {
        if (mutual && mutual.length > 0) showMatch(currentProfile.name);
        else renderNextCard();
      }, 400);
    }

    function passProfile() {
      if (!currentProfile) return;
      const card = document.getElementById('currentCard');
      card.classList.add('hide-left');
      seenIds.push(currentProfile.id);
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      setTimeout(() => renderNextCard(), 400);
    }

    function showMatch(name) {
      document.getElementById('matchSubText').textContent =
        `You and ${name} liked each other! 🎉`;
      document.getElementById('matchPopup').classList.add('show');
    }

    function closeMatch() {
      document.getElementById('matchPopup').classList.remove('show');
      renderNextCard();
    }

    function filterCards(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.remove('active'));
      btn.classList.add('active');
      seenIds = [];
      localStorage.setItem('ehSeen', JSON.stringify(seenIds));
      renderNextCard();
    }

    init();
  </script>
</body>
</html>
