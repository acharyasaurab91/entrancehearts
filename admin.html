<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Admin Panel — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 16px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,20,147,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 90px 20px 60px;
    }
    
    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #141423;
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }
    .stat-card h3 { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .stat-card .number { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #FF1493, #FF6B9D); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,20,147,0.2);
      padding-bottom: 10px;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 10px 24px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      border-radius: 100px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    
    /* Tables */
    .table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,20,147,0.1);
    }
    th {
      color: #FF6B9D;
      font-weight: 600;
    }
    .delete-btn {
      background: rgba(255,68,68,0.2);
      border: 1px solid rgba(255,68,68,0.3);
      color: #ff4444;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: #ff4444;
      color: white;
    }
    .verify-btn {
      background: rgba(76,175,80,0.2);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4caf50;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 8px;
    }
    .search-box {
      margin-bottom: 20px;
    }
    .search-box input {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,20,147,0.2);
      border-radius: 100px;
      color: white;
      width: 300px;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
    }
    .badge.verified { background: rgba(76,175,80,0.2); color: #4caf50; }
    .badge.unverified { background: rgba(255,68,68,0.2); color: #ff4444; }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      th, td { font-size: 0.8rem; padding: 8px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">👑 Admin Panel</a>
    <a href="index.html" style="color: rgba(255,255,255,0.7);">← Back to Site</a>
  </nav>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><h3>Total Users</h3><div class="number" id="totalUsers">0</div></div>
      <div class="stat-card"><h3>Verified Users</h3><div class="number" id="verifiedUsers">0</div></div>
      <div class="stat-card"><h3>Total Confessions</h3><div class="number" id="totalConfessions">0</div></div>
      <div class="stat-card"><h3>Total Materials</h3><div class="number" id="totalMaterials">0</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('users')">👥 Users</button>
      <button class="tab-btn" onclick="showTab('confessions')">💌 Confessions</button>
      <button class="tab-btn" onclick="showTab('materials')">📚 Study Materials</button>
      <button class="tab-btn" onclick="showTab('likes')">❤️ Likes</button>
    </div>

    <!-- Users Tab -->
    <div id="usersTab" class="tab-content active">
      <div class="search-box"><input type="text" id="userSearch" placeholder="Search by name or email..." onkeyup="searchUsers()"></div>
      <div class="table-container"><table id="usersTable"><thead><tr><th>Name</th><th>Email</th><th>Category</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead><tbody id="usersList"></tbody></table></div>
    </div>

    <!-- Confessions Tab -->
    <div id="confessionsTab" class="tab-content">
      <div class="table-container"><table id="confessionsTable"><thead><tr><th>ID</th><th>Text</th><th>Exam</th><th>Date</th><th>Likes</th><th>Actions</th></tr></thead><tbody id="confessionsList"></tbody></table></div>
    </div>

    <!-- Materials Tab -->
    <div id="materialsTab" class="tab-content">
      <div class="table-container"><table id="materialsTable"><thead><tr><th>Title</th><th>Category</th><th>Downloads</th><th>Date</th><th>Actions</th></tr></thead><tbody id="materialsList"></tbody></table></div>
    </div>

    <!-- Likes Tab -->
    <div id="likesTab" class="tab-content">
      <div class="table-container"><table id="likesTable"><thead><tr><th>From</th><th>To</th><th>Date</th><th>Actions</th></tr></thead><tbody id="likesList"></tbody></table></div>
    </div>
  </div>

  <script>
    const ADMIN_CODE = "drsaurab@2022";
    let isAdmin = false;
    let allUsers = [];
    let allConfessions = [];
    let allMaterials = [];
    let allLikes = [];

    async function checkAdmin() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = 'login.html';
        return;
      }
      
      // Check if user has admin status (you can add is_admin column or use email)
      const userEmail = data.session.user.email;
      if (userEmail !== 'admin@entrancehearts.com') {
        const code = prompt('Enter Admin Code:');
        if (code !== ADMIN_CODE) {
          alert('Access Denied!');
          window.location.href = 'index.html';
          return;
        }
      }
      isAdmin = true;
      loadData();
    }

    async function loadData() {
      await Promise.all([
        loadUsers(),
        loadConfessions(),
        loadMaterials(),
        loadLikes(),
        loadStats()
      ]);
    }

    async function loadUsers() {
      const { data } = await supabaseClient
        .from('profiles')
        .select('*, auth.users(email)');
      allUsers = data || [];
      renderUsers();
    }

    async function loadConfessions() {
      const saved = localStorage.getItem('entrancehearts_confessions_v3');
      allConfessions = saved ? JSON.parse(saved) : [];
      renderConfessions();
    }

    async function loadMaterials() {
      const saved = localStorage.getItem('entrancehearts_materials_v2');
      allMaterials = saved ? JSON.parse(saved) : [];
      renderMaterials();
    }

    async function loadLikes() {
      const { data } = await supabaseClient.from('likes').select('*, profiles!from_user(name), profiles!to_user(name)');
      allLikes = data || [];
      renderLikes();
    }

    async function loadStats() {
      const { data: profiles } = await supabaseClient.from('profiles').select('id, is_verified');
      const verified = profiles?.filter(p => p.is_verified === true).length || 0;
      document.getElementById('totalUsers').innerText = profiles?.length || 0;
      document.getElementById('verifiedUsers').innerText = verified;
      document.getElementById('totalConfessions').innerText = allConfessions.length;
      document.getElementById('totalMaterials').innerText = allMaterials.length;
    }

    function renderUsers() {
      const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
      const filtered = allUsers.filter(u => 
        u.name?.toLowerCase().includes(search) || 
        u.location?.toLowerCase().includes(search)
      );
      
      document.getElementById('usersList').innerHTML = filtered.map(user => `
        <tr>
          <td>${user.name || '—'}</td>
          <td>${user.email || '—'}</td>
          <td>${user.category || '—'}</td>
          <td>${user.location || '—'}</td>
          <td><span class="badge ${user.is_verified ? 'verified' : 'unverified'}">${user.is_verified ? '✓ Verified' : '○ Unverified'}</span></td>
          <td>
            ${!user.is_verified ? `<button class="verify-btn" onclick="verifyUser('${user.id}')">Verify</button>` : ''}
            <button class="delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function renderConfessions() {
      document.getElementById('confessionsList').innerHTML = allConfessions.map(c => `
        <tr>
          <td>${c.id}</td>
          <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${c.text?.substring(0, 50)}...</td>
          <td>${c.exam || 'General'}</td>
          <td>${new Date(c.timestamp).toLocaleDateString()}</td>
          <td>${c.likes || 0}</td>
          <td><button class="delete-btn" onclick="deleteConfession(${c.id})">Delete</button></td>
        </tr>
      `).join('');
    }

    function renderMaterials() {
      document.getElementById('materialsList').innerHTML = allMaterials.map(m => `
        <tr>
          <td>${m.title}</td>
          <td>${m.category}</td>
          <td>${m.downloads || 0}</td>
          <td>${new Date(m.timestamp).toLocaleDateString()}</td>
          <td><button class="delete-btn" onclick="deleteMaterial(${m.id})">Delete</button></td>
        </tr>
      `).join('');
    }

    function renderLikes() {
      document.getElementById('likesList').innerHTML = allLikes.map(like => `
        <tr>
          <td>${like.profiles?.[0]?.name || 'Unknown'}</td>
          <td>${like.profiles?.[1]?.name || 'Unknown'}</td>
          <td>${new Date(like.created_at).toLocaleDateString()}</td>
          <td><button class="delete-btn" onclick="deleteLike('${like.id}')">Delete</button></td>
        </tr>
      `).join('');
    }

    async function verifyUser(userId) {
      if (confirm('Verify this user?')) {
        await supabaseClient.from('profiles').update({ is_verified: true }).eq('id', userId);
        showToast('User verified!');
        loadUsers();
      }
    }

    async function deleteUser(userId) {
      if (confirm('Delete this user? This cannot be undone!')) {
        await supabaseClient.from('profiles').delete().eq('id', userId);
        showToast('User deleted!');
        loadUsers();
      }
    }

    function deleteConfession(id) {
      if (confirm('Delete this confession?')) {
        allConfessions = allConfessions.filter(c => c.id !== id);
        localStorage.setItem('entrancehearts_confessions_v3', JSON.stringify(allConfessions));
        renderConfessions();
        loadStats();
        showToast('Confession deleted!');
      }
    }

    function deleteMaterial(id) {
      if (confirm('Delete this material?')) {
        allMaterials = allMaterials.filter(m => m.id !== id);
        localStorage.setItem('entrancehearts_materials_v2', JSON.stringify(allMaterials));
        renderMaterials();
        loadStats();
        showToast('Material deleted!');
      }
    }

    async function deleteLike(id) {
      if (confirm('Delete this like?')) {
        await supabaseClient.from('likes').delete().eq('id', id);
        showToast('Like deleted!');
        loadLikes();
      }
    }

    function searchUsers() {
      renderUsers();
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      document.getElementById(`${tab}Tab`).classList.add('active');
      event.target.classList.add('active');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.position = 'fixed';
      toast.style.bottom = '30px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#141423';
      toast.style.border = '1px solid #FF1493';
      toast.style.padding = '12px 24px';
      toast.style.borderRadius = '50px';
      toast.style.zIndex = '1000';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    checkAdmin();
  </script>
</body>
        </html>
