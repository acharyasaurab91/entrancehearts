<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chats — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; color:#fff; font-family:'Poppins',sans-serif; }
    .navbar {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 20px;
      background:rgba(10,10,15,0.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size:1.1rem; font-weight:800;
      background:linear-gradient(135deg,#ff6b9d,#e63946);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .page { max-width:480px; margin:0 auto; padding:70px 0 90px; }
    .matches-section {
      padding:16px 16px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
      margin-bottom:4px;
    }
    .section-label {
      font-size:0.72rem; font-weight:700;
      color:rgba(255,255,255,0.3);
      text-transform:uppercase; letter-spacing:1.5px;
      margin-bottom:12px;
    }
    .matches-scroll {
      display:flex; gap:16px; overflow-x:auto;
      padding-bottom:16px;
    }
    .matches-scroll::-webkit-scrollbar { display:none; }
    .match-bubble {
      display:flex; flex-direction:column;
      align-items:center; gap:5px; cursor:pointer;
    }
    .match-ring {
      width:58px; height:58px; border-radius:50%;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      padding:2px; flex-shrink:0; position:relative;
    }
    .match-ring-inner {
      width:100%; height:100%; border-radius:50%;
      background:#0a0a0f;
      display:flex; align-items:center; justify-content:center;
      font-size:1.7rem;
      overflow:hidden;
    }
    .match-ring-inner img {
      width:100%; height:100%; object-fit:cover; border-radius:50%;
    }
    /* Online dot on match bubble */
    .online-dot-bubble {
      width:13px; height:13px; border-radius:50%;
      background:#4caf50; border:2px solid #0a0a0f;
      position:absolute; bottom:1px; right:1px;
      display:none;
    }
    .online-dot-bubble.visible { display:block; }
    .match-bubble span {
      font-size:0.68rem; color:rgba(255,255,255,0.5);
      white-space:nowrap; max-width:60px;
      overflow:hidden; text-overflow:ellipsis;
    }
    .chats-list { padding:8px 0; }
    .chat-item {
      display:flex; align-items:center; gap:14px;
      padding:14px 16px; cursor:pointer; transition:background 0.2s;
      position:relative;
    }
    .chat-item:hover { background:rgba(255,255,255,0.03); }
    .chat-avatar-wrap { position:relative; flex-shrink:0; }
    .chat-avatar {
      width:52px; height:52px; border-radius:50%;
      background:rgba(255,255,255,0.06);
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; overflow:hidden;
    }
    .chat-avatar img {
      width:100%; height:100%; object-fit:cover; border-radius:50%;
    }
    /* Online dot on chat list */
    .online-dot-list {
      width:14px; height:14px; border-radius:50%;
      background:#4caf50; border:2px solid #0a0a0f;
      position:absolute; bottom:1px; right:1px;
      display:none;
    }
    .online-dot-list.visible { display:block; }
    .chat-info { flex:1; min-width:0; }
    .chat-name { font-size:0.95rem; font-weight:600; margin-bottom:3px; }
    .chat-preview {
      font-size:0.78rem; color:rgba(255,255,255,0.35);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .chat-meta {
      display:flex; flex-direction:column;
      align-items:flex-end; gap:5px;
    }
    .chat-time { font-size:0.68rem; color:rgba(255,255,255,0.3); }
    .unread-dot {
      width:8px; height:8px; border-radius:50%;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
    }
    .empty-chats {
      text-align:center; padding:60px 20px;
    }
    .empty-chats .e-emoji { font-size:3.5rem; margin-bottom:14px; }
    .empty-chats h3 { font-size:1.1rem; margin-bottom:8px; }
    .empty-chats p { color:rgba(255,255,255,0.35); font-size:0.82rem; }
    .cta-btn {
      display:inline-block; margin-top:16px; padding:12px 24px;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      border-radius:50px; color:white; text-decoration:none;
      font-weight:600; font-size:0.88rem;
    }

    /* ── CHAT WINDOW ── */
    .chat-window {
      display:none; flex-direction:column;
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:#0a0a0f; z-index:200;
      max-width:480px; margin:0 auto;
    }
    .chat-window.open { display:flex; }
    .chat-header {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px;
      background:rgba(10,10,15,0.98);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .back-btn-chat {
      font-size:1.3rem; cursor:pointer;
      color:rgba(255,255,255,0.6); padding:4px;
    }
    .chat-header-avatar-wrap { position:relative; }
    .chat-header-avatar {
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,0.06);
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; overflow:hidden; flex-shrink:0;
    }
    .chat-header-avatar img {
      width:100%; height:100%; object-fit:cover; border-radius:50%;
    }
    /* Online dot in header */
    .online-dot-header {
      width:11px; height:11px; border-radius:50%;
      background:#4caf50; border:2px solid #0a0a0f;
      position:absolute; bottom:0; right:0;
      display:none;
    }
    .online-dot-header.visible { display:block; }
    .chat-header-info { flex:1; }
    .chat-header-name { font-size:0.95rem; font-weight:700; }
    .chat-header-status {
      font-size:0.72rem;
      color:rgba(255,255,255,0.35);
      min-height:16px;
    }
    .chat-header-status.online { color:#4caf50; }
    .messages-area {
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column; gap:8px;
      scroll-behavior:smooth;
    }
    .msg-wrap { display:flex; flex-direction:column; }
    .msg-wrap.sent { align-items:flex-end; }
    .msg-wrap.received { align-items:flex-start; }
    .msg {
      max-width:75%; padding:10px 14px;
      border-radius:18px; font-size:0.87rem; line-height:1.5;
    }
    .msg.sent {
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      color:white; border-bottom-right-radius:4px;
    }
    .msg.received {
      background:rgba(255,255,255,0.07);
      color:rgba(255,255,255,0.85);
      border-bottom-left-radius:4px;
    }
    .msg-footer {
      display:flex; align-items:center; gap:4px;
      margin-top:3px; padding:0 4px;
    }
    .msg-time {
      font-size:0.65rem; color:rgba(255,255,255,0.25);
    }
    /* Read receipt ticks */
    .msg-tick {
      font-size:0.65rem; color:rgba(255,255,255,0.25);
      line-height:1;
    }
    .msg-tick.seen { color:#4fc3f7; }

    /* Typing indicator */
    .typing-indicator {
      display:none; align-items:center; gap:4px;
      padding:4px 0 4px 4px;
    }
    .typing-indicator.visible { display:flex; }
    .typing-indicator span {
      font-size:0.75rem; color:rgba(255,255,255,0.35);
      font-style:italic;
    }
    .typing-dots {
      display:flex; gap:3px; align-items:center;
    }
    .typing-dots div {
      width:6px; height:6px; border-radius:50%;
      background:rgba(255,255,255,0.3);
      animation:bounce 1.2s infinite ease-in-out;
    }
    .typing-dots div:nth-child(2) { animation-delay:0.2s; }
    .typing-dots div:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-5px); }
    }

    .chat-input-row {
      display:flex; gap:10px; padding:12px 16px;
      background:rgba(10,10,15,0.98);
      border-top:1px solid rgba(255,255,255,0.05);
    }
    .chat-input {
      flex:1; padding:12px 16px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:50px; color:#fff;
      font-size:0.88rem; font-family:'Poppins',sans-serif; outline:none;
    }
    .chat-input:focus { border-color:rgba(255,107,157,0.4); }
    .send-btn {
      width:46px; height:46px; border-radius:50%;
      background:linear-gradient(135deg,#e63946,#ff6b9d);
      border:none; color:white; font-size:1rem;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(10,10,15,0.98);
      border-top:1px solid rgba(255,255,255,0.05);
      display:flex; justify-content:space-around;
      padding:10px 0 16px; z-index:100;
      backdrop-filter:blur(20px);
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center;
      gap:3px; color:rgba(255,255,255,0.3);
      text-decoration:none; font-size:0.62rem; font-weight:600;
    }
    .nav-item.active { color:#ff6b9d; }
    .nav-item span:first-child { font-size:1.3rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">💕 EntranceHearts</div>
  </nav>

  <div class="page">
    <div class="matches-section">
      <div class="section-label">💕 New Matches</div>
      <div class="matches-scroll" id="matchesScroll">
        <p style="color:rgba(255,255,255,0.3);font-size:0.8rem;padding:8px 0">Loading...</p>
      </div>
    </div>
    <div class="chats-list" id="chatsList">
      <p style="color:rgba(255,255,255,0.3);font-size:0.85rem;text-align:center;padding:20px">Loading chats...</p>
    </div>
  </div>

  <!-- CHAT WINDOW -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <span class="back-btn-chat" onclick="closeChat()">←</span>
      <div class="chat-header-avatar-wrap">
        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
        <div class="online-dot-header" id="headerOnlineDot"></div>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatHeaderName"></div>
        <div class="chat-header-status" id="chatHeaderStatus">Offline</div>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <!-- Typing indicator lives inside messages area, always last -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <div></div><div></div><div></div>
        </div>
        <span id="typingName"></span>
      </div>
    </div>

    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Type a message..."/>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item active"><span>💬</span><span>Chats</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    const genderEmoji = { male:'👨', female:'👩', other:'🧑' };
    let currentUserId = null;
    let currentChatUserId = null;
    let currentChatName = '';
    let matches = [];
    let msgSubscription = null;
    let presenceChannel = null;
    let typingChannel = null;
    let typingTimer = null;
    let isTyping = false;
    let onlineUsers = new Set();

    /* ── INIT ── */
    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;
      await loadMatches();
      subscribePresence();
    }

    /* ── PRESENCE (online/offline) ── */
    function subscribePresence() {
      presenceChannel = supabaseClient.channel('online-users', {
        config: { presence: { key: currentUserId } }
      });

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          onlineUsers = new Set(Object.keys(state));
          updateOnlineUI();
        })
        .on('presence', { event: 'join' }, ({ key }) => {
          onlineUsers.add(key);
          updateOnlineUI();
        })
        .on('presence', { event: 'leave' }, ({ key }) => {
          onlineUsers.delete(key);
          updateOnlineUI();
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await presenceChannel.track({ user_id: currentUserId, online_at: new Date().toISOString() });
          }
        });
    }

    function updateOnlineUI() {
      // Update match bubbles
      matches.forEach(m => {
        const dot = document.getElementById(`bubble-dot-${m.id}`);
        if (dot) dot.classList.toggle('visible', onlineUsers.has(m.id));
        const listDot = document.getElementById(`list-dot-${m.id}`);
        if (listDot) listDot.classList.toggle('visible', onlineUsers.has(m.id));
      });

      // Update header if chat is open
      if (currentChatUserId) {
        const isOnline = onlineUsers.has(currentChatUserId);
        const statusEl = document.getElementById('chatHeaderStatus');
        const headerDot = document.getElementById('headerOnlineDot');
        if (statusEl) {
          statusEl.textContent = isOnline ? '● Online' : 'Offline';
          statusEl.className = 'chat-header-status' + (isOnline ? ' online' : '');
        }
        if (headerDot) headerDot.classList.toggle('visible', isOnline);
      }
    }

    /* ── LOAD MATCHES ── */
    async function loadMatches() {
      const { data: myLikes } = await supabaseClient
        .from('likes').select('to_user').eq('from_user', currentUserId);
      if (!myLikes || myLikes.length === 0) { renderEmpty(); return; }
      const likedIds = myLikes.map(l => l.to_user);
      const { data: mutual } = await supabaseClient
        .from('likes').select('from_user')
        .eq('to_user', currentUserId).in('from_user', likedIds);
      if (!mutual || mutual.length === 0) { renderEmpty(); return; }
      const matchIds = mutual.map(l => l.from_user);
      const { data: profiles } = await supabaseClient
        .from('profiles').select('*').in('id', matchIds);
      matches = profiles || [];
      renderMatchBubbles();
      await renderChatList();
    }

    function renderEmpty() {
      document.getElementById('matchesScroll').innerHTML =
        '<p style="color:rgba(255,255,255,0.3);font-size:0.8rem;padding:8px 0">No matches yet 💕</p>';
      document.getElementById('chatsList').innerHTML = `
        <div class="empty-chats">
          <div class="e-emoji">💬</div>
          <h3>No matches yet!</h3>
          <p>Like someone to start chatting.</p>
          <a href="browse.html" class="cta-btn">Discover People 🔥</a>
        </div>`;
    }

    function getAvatar(m) {
      if (m.avatar_url) return `<img src="${m.avatar_url}" alt="${m.name}"/>`;
      return genderEmoji[m.gender] || '🧑';
    }

    function renderMatchBubbles() {
      document.getElementById('matchesScroll').innerHTML =
        matches.map(m => `
          <div class="match-bubble" onclick="openChat('${m.id}','${m.name}','${m.gender}','${m.avatar_url||''}')">
            <div class="match-ring">
              <div class="match-ring-inner">${getAvatar(m)}</div>
              <div class="online-dot-bubble" id="bubble-dot-${m.id}"></div>
            </div>
            <span>${m.name.split(' ')[0]}</span>
          </div>`).join('');
    }

    /* ── CHAT LIST with last message ── */
    async function renderChatList() {
      // Fetch last message for each match
      const chatItems = await Promise.all(matches.map(async m => {
        const { data: msgs } = await supabaseClient
          .from('messages').select('text,created_at,from_user,seen')
          .or(`and(from_user.eq.${currentUserId},to_user.eq.${m.id}),and(from_user.eq.${m.id},to_user.eq.${currentUserId})`)
          .order('created_at', { ascending:false })
          .limit(1);
        const last = msgs && msgs[0];
        const preview = last
          ? (last.from_user === currentUserId ? `You: ${last.text}` : last.text)
          : "You matched! Say hello 👋";
        const timeStr = last
          ? formatTime(last.created_at)
          : '';
        const hasUnread = last && last.from_user !== currentUserId && !last.seen;
        return { m, preview, timeStr, hasUnread };
      }));

      document.getElementById('chatsList').innerHTML = chatItems.map(({ m, preview, timeStr, hasUnread }) => `
        <div class="chat-item" onclick="openChat('${m.id}','${m.name}','${m.gender}','${m.avatar_url||''}')">
          <div class="chat-avatar-wrap">
            <div class="chat-avatar">${getAvatar(m)}</div>
            <div class="online-dot-list" id="list-dot-${m.id}"></div>
          </div>
          <div class="chat-info">
            <div class="chat-name">${m.name}</div>
            <div class="chat-preview">${escapeHtml(preview)}</div>
          </div>
          <div class="chat-meta">
            ${timeStr ? `<div class="chat-time">${timeStr}</div>` : ''}
            ${hasUnread ? '<div class="unread-dot"></div>' : ''}
          </div>
        </div>`).join('');

      updateOnlineUI();
    }

    /* ── OPEN CHAT ── */
    async function openChat(userId, name, gender, avatarUrl) {
      currentChatUserId = userId;
      currentChatName = name.split(' ')[0];

      document.getElementById('chatHeaderName').textContent = name;
      const avatarEl = document.getElementById('chatHeaderAvatar');
      avatarEl.innerHTML = avatarUrl
        ? `<img src="${avatarUrl}" alt="${name}"/>`
        : genderEmoji[gender] || '🧑';

      // Set online status
      const isOnline = onlineUsers.has(userId);
      const statusEl = document.getElementById('chatHeaderStatus');
      statusEl.textContent = isOnline ? '● Online' : 'Offline';
      statusEl.className = 'chat-header-status' + (isOnline ? ' online' : '');
      document.getElementById('headerOnlineDot').classList.toggle('visible', isOnline);

      document.getElementById('chatWindow').classList.add('open');
      await loadMessages();
      subscribeMessages();
      subscribeTyping();

      // Mark incoming messages as seen
      await markSeen();
    }

    function closeChat() {
      document.getElementById('chatWindow').classList.remove('open');
      currentChatUserId = null;
      currentChatName = '';
      if (msgSubscription) {
        supabaseClient.removeChannel(msgSubscription);
        msgSubscription = null;
      }
      if (typingChannel) {
        supabaseClient.removeChannel(typingChannel);
        typingChannel = null;
      }
    }

    /* ── MARK SEEN ── */
    async function markSeen() {
      if (!currentChatUserId) return;
      await supabaseClient
        .from('messages')
        .update({ seen: true })
        .eq('from_user', currentChatUserId)
        .eq('to_user', currentUserId)
        .eq('seen', false);
    }

    
    /* ── LOAD MESSAGES ── */
    async function loadMessages() {
      const area = document.getElementById('messagesArea');
      const typingEl = document.getElementById('typingIndicator');

      const { data: msgs } = await supabaseClient
        .from('messages').select('*')
        .or(`and(from_user.eq.${currentUserId},to_user.eq.${currentChatUserId}),and(from_user.eq.${currentChatUserId},to_user.eq.${currentUserId})`)
        .order('created_at', { ascending:true });

      if (!msgs || msgs.length === 0) {
        area.innerHTML = `
          <div style="text-align:center;padding:40px 20px">
            <div style="font-size:2.5rem;margin-bottom:10px">👋</div>
            <p style="color:rgba(255,255,255,0.35);font-size:0.85rem">Say hello and break the ice!</p>
          </div>`;
        area.appendChild(typingEl);
        return;
      }

      // Build message HTML
      const msgHTML = msgs.map((m, i) => {
        const sent = m.from_user === currentUserId;
        const time = new Date(m.created_at).toLocaleTimeString([],
          { hour:'2-digit', minute:'2-digit' });
        const isLastSent = sent && (i === msgs.length - 1 || msgs[i+1]?.from_user !== currentUserId);
        const tickHTML = sent
          ? `<span class="msg-tick ${m.seen ? 'seen' : ''}">
               ${m.seen ? '✓✓' : '✓'}
             </span>`
          : '';
        return `
          <div class="msg-wrap ${sent ? 'sent' : 'received'}">
            <div class="msg ${sent ? 'sent' : 'received'}">${escapeHtml(m.text)}</div>
            <div class="msg-footer">
              <span class="msg-time">${time}</span>
              ${tickHTML}
            </div>
          </div>`;
      }).join('');

      area.innerHTML = msgHTML;
      area.appendChild(typingEl);
      area.scrollTop = area.scrollHeight;
    }

    /* ── SUBSCRIBE TO NEW MESSAGES ── */
    function subscribeMessages() {
      if (msgSubscription) supabaseClient.removeChannel(msgSubscription);
      msgSubscription = supabaseClient.channel('msgs-' + currentChatUserId)
        .on('postgres_changes', {
          event:'INSERT', schema:'public', table:'messages'
        }, async () => {
          await loadMessages();
          await markSeen();
        })
        .on('postgres_changes', {
          event:'UPDATE', schema:'public', table:'messages'
        }, () => loadMessages())
        .subscribe();
    }

    /* ── TYPING INDICATOR ── */
    function subscribeTyping() {
      if (typingChannel) supabaseClient.removeChannel(typingChannel);
      const channelName = [currentUserId, currentChatUserId].sort().join('-');
      typingChannel = supabaseClient.channel('typing-' + channelName);
      typingChannel
        .on('broadcast', { event:'typing' }, ({ payload }) => {
          if (payload.user_id === currentChatUserId) {
            showTyping(payload.is_typing);
          }
        })
        .subscribe();
    }

    function showTyping(isTypingNow) {
      const el = document.getElementById('typingIndicator');
      const nameEl = document.getElementById('typingName');
      nameEl.textContent = isTypingNow ? `${currentChatName} is typing...` : '';
      el.classList.toggle('visible', isTypingNow);
      const area = document.getElementById('messagesArea');
      if (isTypingNow) area.scrollTop = area.scrollHeight;
    }

    function broadcastTyping(typing) {
      if (!typingChannel || !currentChatUserId) return;
      typingChannel.send({
        type:'broadcast', event:'typing',
        payload: { user_id: currentUserId, is_typing: typing }
      });
    }

    /* ── INPUT TYPING EVENTS ── */
    document.getElementById('chatInput').addEventListener('input', () => {
      if (!isTyping) {
        isTyping = true;
        broadcastTyping(true);
      }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        isTyping = false;
        broadcastTyping(false);
      }, 2000);
    });

    document.getElementById('chatInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    /* ── SEND MESSAGE ── */
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentChatUserId) return;
      input.value = '';

      // Stop typing broadcast
      clearTimeout(typingTimer);
      isTyping = false;
      broadcastTyping(false);

      await supabaseClient.from('messages').insert({
        from_user: currentUserId,
        to_user: currentChatUserId,
        text,
        seen: false
      });
      await loadMessages();
    }

    /* ── HELPERS ── */
    function formatTime(isoStr) {
      const d = new Date(isoStr);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
      if (diff < 86400000) return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      return d.toLocaleDateString([], { month:'short', day:'numeric' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
